<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>막이 오르다</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Noto+Serif+KR:wght@300;400;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  /* ── DEFAULT THEME: 버닝 (Dark Gold) ── */
  :root {
    --bg: #0d0c0a;
    --surface: #161410;
    --surface2: #1e1b17;
    --surface3: #252118;
    --border: #2e2920;
    --border2: #3a3428;
    --accent: #c9a84c;
    --accent-light: #e4c97a;
    --accent-dim: #7a6530;
    --red: #c94c4c;
    --cream: #f0e8d8;
    --cream-dim: #9a9080;
    --cream-muted: #6a6058;
    --text: #ede6d8;
    --text-dim: #b0a898;
    --text-muted: #6e6860;
    /* legacy aliases */
    --gold: var(--accent);
    --gold-light: var(--accent-light);
    --gold-dim: var(--accent-dim);
  }

  /* ── THEME 2: 문라이트 (Midnight Blue) ── */
  body.theme-moonlight {
    background: #08090f !important;
    color: #d8dfff !important;
    --bg: #08090f;
    --surface: #0f1120;
    --surface2: #161829;
    --surface3: #1c1f33;
    --border: #232640;
    --border2: #2e3260;
    --accent: #6c8fff;
    --accent-light: #99b2ff;
    --accent-dim: #3a4ea0;
    --red: #ff6b6b;
    --cream: #d8dfff;
    --cream-dim: #8890b8;
    --cream-muted: #555c80;
    --text: #d8dfff;
    --text-dim: #9aa0c8;
    --text-muted: #5a6090;
  }

  /* ── THEME 3: 벚꽃 (Sakura) ── */
  body.theme-sakura {
    background: #f9f3f5 !important;
    color: #3a1a22 !important;
    --bg: #f9f3f5;
    --surface: #fff0f3;
    --surface2: #fce4ea;
    --surface3: #f8d6df;
    --border: #f0c8d4;
    --border2: #e8b0c0;
    --accent: #c4607a;
    --accent-light: #e0899c;
    --accent-dim: #a04060;
    --red: #c4607a;
    --cream: #3a1a22;
    --cream-dim: #6a3a48;
    --cream-muted: #9a6a78;
    --text: #3a1a22;
    --text-dim: #6a3a48;
    --text-muted: #b08090;
  }

  /* ── THEME 4: 매트릭스 (Terminal Green) ── */
  body.theme-matrix {
    background: #010a04 !important;
    color: #b8ffcc !important;
    --bg: #010a04;
    --surface: #041008;
    --surface2: #071a0c;
    --surface3: #0a2212;
    --border: #0f3018;
    --border2: #164020;
    --accent: #00e55a;
    --accent-light: #4dff8a;
    --accent-dim: #007a30;
    --red: #ff4444;
    --cream: #b8ffcc;
    --cream-dim: #70c888;
    --cream-muted: #3a7a50;
    --text: #b8ffcc;
    --text-dim: #70c888;
    --text-muted: #3a7a50;
  }

  /* ── THEME 5: 노을 (Sunset) ── */
  body.theme-sunset {
    background: #12080e !important;
    color: #ffddd0 !important;
    --bg: #12080e;
    --surface: #1e0e18;
    --surface2: #2a1420;
    --surface3: #361a28;
    --border: #4a2038;
    --border2: #5e2a48;
    --accent: #ff7c4a;
    --accent-light: #ffaa80;
    --accent-dim: #a04020;
    --red: #ff4a6a;
    --cream: #ffddd0;
    --cream-dim: #c0907a;
    --cream-muted: #806050;
    --text: #ffddd0;
    --text-dim: #c8a090;
    --text-muted: #806050;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif KR', serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* NOISE OVERLAY */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.5;
  }

  /* HEADER */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--gold);
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
  }

  .logo-dot {
    width: 6px;
    height: 6px;
    background: var(--gold);
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  nav {
    display: flex;
    align-items: center;
    gap: 32px;
  }

  nav button {
    background: none;
    border: none;
    color: var(--text-muted);
    font-family: 'Noto Serif KR', serif;
    font-size: 13px;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: color 0.2s;
    padding: 4px 0;
    position: relative;
  }

  nav button::after {
    content: '';
    position: absolute;
    bottom: -2px;
    left: 0;
    width: 0;
    height: 1px;
    background: var(--gold);
    transition: width 0.3s;
  }

  nav button:hover { color: var(--cream); }
  nav button:hover::after { width: 100%; }
  nav button.active { color: var(--gold); }
  nav button.active::after { width: 100%; }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .btn-add {
    background: var(--gold);
    color: #0d0c0a;
    border: none;
    padding: 8px 20px;
    font-family: 'Noto Serif KR', serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.2s;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
  }

  .btn-add:hover {
    background: var(--gold-light);
    transform: translateY(-1px);
  }

  /* SEARCH BAR */
  .search-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }

  .search-wrap input {
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--text);
    padding: 8px 36px 8px 14px;
    font-family: 'Noto Serif KR', serif;
    font-size: 12px;
    width: 200px;
    outline: none;
    transition: all 0.3s;
  }

  .search-wrap input:focus {
    border-color: var(--gold-dim);
    width: 260px;
    background: var(--surface3);
  }

  .search-wrap input::placeholder { color: var(--text-muted); }

  .search-icon {
    position: absolute;
    right: 10px;
    color: var(--text-muted);
    font-size: 14px;
    pointer-events: none;
  }

  /* PAGES */
  .page { display: none; animation: fadeIn 0.4s ease; }
  .page.active { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* HERO */
  .hero {
    padding: 80px 40px 60px;
    max-width: 1200px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    align-items: center;
  }

  .hero-text h1 {
    font-family: 'Playfair Display', serif;
    font-size: 56px;
    line-height: 1.15;
    color: var(--cream);
    margin-bottom: 20px;
  }

  .hero-text h1 em {
    font-style: italic;
    color: var(--gold);
  }

  .hero-text p {
    color: var(--text-muted);
    font-size: 15px;
    line-height: 1.9;
    max-width: 400px;
    font-weight: 300;
  }

  .hero-stats {
    display: flex;
    gap: 40px;
    margin-top: 40px;
  }

  .stat-item {
    text-align: center;
  }

  .stat-num {
    font-family: 'DM Mono', monospace;
    font-size: 36px;
    color: var(--gold);
    font-weight: 300;
    display: block;
  }

  .stat-label {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* FEATURED FILM */
  .featured-card {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border2);
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.3s;
  }

  .featured-card:hover { transform: translateY(-4px); }

  .featured-poster {
    width: 100%;
    aspect-ratio: 2/3;
    background: linear-gradient(135deg, #1a1510 0%, #2d2518 50%, #1a1510 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 80px;
    position: relative;
    overflow: hidden;
  }

  .featured-poster::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(13,12,10,0.9) 0%, transparent 60%);
  }

  .featured-info {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 24px;
    z-index: 2;
  }

  .featured-tag {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--gold);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .featured-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    color: var(--cream);
    margin-bottom: 8px;
  }

  .featured-rating {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* SECTION LAYOUT */
  .section {
    max-width: 1200px;
    margin: 0 auto;
    padding: 60px 40px;
  }

  .section-header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 40px;
  }

  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    color: var(--cream);
  }

  .section-subtitle {
    font-size: 12px;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.1em;
  }

  .section-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* FILM GRID */
  .film-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 24px;
  }

  .film-card {
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
  }

  .film-card:hover { transform: translateY(-6px); }
  .film-card:hover .film-overlay { opacity: 1; }

  .film-poster {
    width: 100%;
    aspect-ratio: 2/3;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
    border: 1px solid var(--border);
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .film-card:hover .film-poster {
    border-color: var(--gold-dim);
  }

  .film-overlay {
    position: absolute;
    inset: 0;
    background: rgba(201, 168, 76, 0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.25s;
    font-size: 28px;
  }

  .film-status {
    position: absolute;
    top: 8px;
    right: 8px;
    padding: 3px 8px;
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    font-weight: 400;
  }

  .status-watched { background: var(--gold); color: #0d0c0a; }
  .status-want { background: transparent; color: var(--gold); border: 1px solid var(--gold-dim); }
  .status-watching { background: var(--red); color: white; }

  .film-info {
    padding: 12px 4px 4px;
  }

  .film-title {
    font-size: 13px;
    color: var(--text);
    font-weight: 600;
    line-height: 1.4;
    margin-bottom: 4px;
  }

  .film-meta {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
  }

  /* STAR RATING */
  .stars {
    display: flex;
    gap: 2px;
    align-items: center;
  }

  .star {
    color: var(--border2);
    font-size: 13px;
    transition: color 0.15s;
    cursor: pointer;
    user-select: none;
  }

  .star.filled { color: var(--gold); }
  .star.half { color: var(--gold); opacity: 0.6; }

  /* REVIEW FEED */
  .review-feed {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .review-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 28px;
    transition: border-color 0.2s;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }

  .review-card::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 2px;
    background: var(--gold);
    transform: scaleY(0);
    transition: transform 0.3s;
    transform-origin: top;
  }

  .review-card:hover { border-color: var(--border2); }
  .review-card:hover::before { transform: scaleY(1); }

  .review-header {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    margin-bottom: 16px;
  }

  .review-poster-sm {
    width: 48px;
    height: 72px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    flex-shrink: 0;
  }

  .review-meta h3 {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    color: var(--cream);
    margin-bottom: 6px;
  }

  .review-date {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 6px;
  }

  .review-text {
    font-size: 14px;
    color: var(--text-dim);
    line-height: 1.9;
    font-weight: 300;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .review-tags {
    margin-top: 16px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .tag {
    padding: 3px 10px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.05em;
  }

  /* FILTER BAR */
  .filter-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 32px;
    flex-wrap: wrap;
    align-items: center;
  }

  .filter-btn {
    padding: 6px 16px;
    background: none;
    border: 1px solid var(--border2);
    color: var(--text-muted);
    font-family: 'Noto Serif KR', serif;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .filter-btn:hover, .filter-btn.active {
    background: var(--gold);
    color: #0d0c0a;
    border-color: var(--gold);
    font-weight: 600;
  }

  /* STATS PAGE */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    margin-bottom: 40px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 28px;
    text-align: center;
  }

  .stat-card .big-num {
    font-family: 'Playfair Display', serif;
    font-size: 48px;
    color: var(--gold);
    font-weight: 400;
    display: block;
    line-height: 1;
    margin-bottom: 8px;
  }

  .stat-card .label {
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    font-family: 'DM Mono', monospace;
  }

  /* GENRE BAR CHART */
  .genre-chart {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 32px;
    margin-bottom: 20px;
  }

  .genre-chart h3 {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    color: var(--cream);
    margin-bottom: 24px;
  }

  .genre-bar-row {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 14px;
  }

  .genre-label {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
    width: 60px;
    text-align: right;
    flex-shrink: 0;
  }

  .genre-bar-track {
    flex: 1;
    height: 6px;
    background: var(--surface2);
    position: relative;
    overflow: hidden;
  }

  .genre-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold-dim), var(--gold));
    transition: width 1s ease;
  }

  .genre-count {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--gold);
    width: 24px;
    flex-shrink: 0;
  }

  /* ── POSTER CALENDAR ── */
  .poster-calendar {
    width: 100%;
  }

  .cal-month-block {
    margin-bottom: 36px;
  }

  .cal-month-name {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    color: var(--cream);
    margin-bottom: 12px;
    display: flex;
    align-items: baseline;
    gap: 10px;
  }

  .cal-month-count {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.1em;
  }

  .cal-week-header {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
    margin-bottom: 3px;
  }

  .cal-week-day {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--text-muted);
    text-align: center;
    padding: 3px 0;
    letter-spacing: 0.05em;
  }

  .cal-week-day:first-child { color: #e06060; }
  .cal-week-day:last-child { color: #6080e0; }

  .cal-days-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
  }

  .cal-day {
    aspect-ratio: 3/4;
    position: relative;
    border: 1px solid var(--border);
    background: var(--surface2);
    overflow: hidden;
    cursor: default;
    transition: transform 0.15s;
  }

  .cal-day.empty {
    background: transparent;
    border-color: transparent;
  }

  .cal-day.has-record {
    border-color: var(--accent-dim);
    cursor: pointer;
  }

  .cal-day.has-record:hover {
    transform: scale(1.06);
    z-index: 2;
    border-color: var(--accent);
  }

  .cal-day-num {
    position: absolute;
    top: 3px;
    left: 4px;
    font-family: 'DM Mono', monospace;
    font-size: 8px;
    color: var(--text-muted);
    z-index: 2;
    line-height: 1;
  }

  .cal-day.has-record .cal-day-num {
    color: var(--cream);
    text-shadow: 0 1px 3px rgba(0,0,0,0.8);
  }

  .cal-day img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: absolute;
    inset: 0;
  }

  .cal-day-emoji {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .cal-day-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 50%);
    z-index: 1;
  }

  .cal-day-title {
    position: absolute;
    bottom: 2px;
    left: 3px;
    right: 3px;
    font-size: 7px;
    color: white;
    z-index: 2;
    line-height: 1.2;
    font-family: 'Noto Serif KR', serif;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* 여러 편 겹칠 때 스택 표시 */
  .cal-day-multi {
    position: absolute;
    top: 3px;
    right: 3px;
    background: var(--accent);
    color: #000;
    font-family: 'DM Mono', monospace;
    font-size: 7px;
    font-weight: 700;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 3;
  }

  .cal-empty-month {
    color: var(--text-muted);
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    padding: 8px 0;
    letter-spacing: 0.08em;
  }

  /* month dot (old) alias for compat */
  .month-label { display: none; }
  .month-dots { display: none; }
  .cal-dot { display: none; }

  @media (max-width: 768px) {
    .cal-month-name { font-size: 15px; }
    .cal-day-emoji { font-size: 14px; }
    .cal-days-grid { gap: 2px; }
    .cal-week-header { gap: 2px; }
  }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.82);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 40px;
    backdrop-filter: blur(8px);
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border2);
    width: 100%;
    max-width: 560px;
    max-height: 80vh;
    overflow-y: auto;
    animation: slideUp 0.3s ease;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .modal-header {
    padding: 28px 28px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .modal-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: var(--cream);
  }

  .modal-close {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 22px;
    cursor: pointer;
    transition: color 0.2s;
    line-height: 1;
  }

  .modal-close:hover { color: var(--cream); }

  .modal-body { padding: 28px; }

  .form-group { margin-bottom: 24px; }

  .form-label {
    display: block;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .form-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--text);
    padding: 12px 14px;
    font-family: 'Noto Serif KR', serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .form-input:focus { border-color: var(--gold-dim); }

  textarea.form-input {
    height: 120px;
    resize: vertical;
    line-height: 1.7;
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .star-input {
    display: flex;
    gap: 6px;
  }

  .star-input .star {
    font-size: 24px;
    cursor: pointer;
  }

  .status-select {
    display: flex;
    gap: 10px;
  }

  .status-btn {
    flex: 1;
    padding: 10px;
    background: none;
    border: 1px solid var(--border2);
    color: var(--text-muted);
    font-family: 'Noto Serif KR', serif;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }

  .status-btn.selected-watched { background: var(--gold); color: #0d0c0a; border-color: var(--gold); font-weight: 600; }
  .status-btn.selected-want { background: transparent; color: var(--gold); border-color: var(--gold); }
  .status-btn.selected-watching { background: var(--red); color: white; border-color: var(--red); }

  .btn-save {
    width: 100%;
    padding: 14px;
    background: var(--gold);
    border: none;
    color: #0d0c0a;
    font-family: 'Noto Serif KR', serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: background 0.2s;
    margin-top: 8px;
  }

  .btn-save:hover { background: var(--gold-light); }

  /* DETAIL MODAL */
  .detail-modal {
    max-width: 700px;
  }

  .detail-top {
    display: flex;
    gap: 24px;
    padding: 28px;
    border-bottom: 1px solid var(--border);
  }

  .detail-poster-lg {
    width: 120px;
    height: 180px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 56px;
    flex-shrink: 0;
  }

  .detail-info h2 {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    color: var(--cream);
    margin-bottom: 8px;
    line-height: 1.3;
  }

  .detail-year {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 16px;
  }

  .detail-review {
    padding: 28px;
    font-size: 14px;
    color: var(--text-dim);
    line-height: 2;
    font-weight: 300;
    white-space: pre-wrap;
  }

  .detail-actions {
    padding: 0 28px 28px;
    display: flex;
    gap: 12px;
  }

  .btn-edit {
    flex: 1;
    padding: 10px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--text-muted);
    font-family: 'Noto Serif KR', serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-edit:hover { color: var(--cream); border-color: var(--border2); }

  .btn-delete {
    padding: 10px 20px;
    background: none;
    border: 1px solid var(--red);
    color: var(--red);
    font-family: 'Noto Serif KR', serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-delete:hover { background: var(--red); color: white; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 40px;
    right: 40px;
    background: var(--surface3);
    border: 1px solid var(--gold-dim);
    color: var(--cream);
    padding: 14px 24px;
    font-size: 13px;
    font-family: 'Noto Serif KR', serif;
    z-index: 9000;
    transform: translateY(20px);
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
  }

  .toast.show { transform: translateY(0); opacity: 1; }

  /* DIVIDER */
  .gold-divider {
    width: 40px;
    height: 1px;
    background: var(--gold);
    margin: 12px 0 20px;
  }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 80px 40px;
    color: var(--text-muted);
  }

  .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
  .empty-state p { font-size: 14px; line-height: 1.7; }

  /* RATING DISPLAY */
  .rating-display {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
  }

  /* BOTTOM NAV (mobile) */
  .bottom-nav {
    display: none;
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 200;
    background: var(--bg);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--border2);
    padding: 0 0 env(safe-area-inset-bottom, 0);
  }

  .bottom-nav-inner {
    display: flex;
    align-items: stretch;
    height: 58px;
  }

  .bnav-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    background: none;
    border: none;
    color: var(--text-muted);
    font-family: 'Noto Serif KR', serif;
    font-size: 10px;
    letter-spacing: 0.03em;
    cursor: pointer;
    transition: color 0.2s;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
  }

  .bnav-btn .bnav-icon { font-size: 20px; line-height: 1; }
  .bnav-btn.active { color: var(--gold); }

  .bnav-btn-add {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    background: none;
    border: none;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    padding: 0;
  }

  .bnav-add-circle {
    width: 44px;
    height: 44px;
    background: var(--gold);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    color: #0d0c0a;
    font-weight: 700;
    box-shadow: 0 4px 16px rgba(201,168,76,0.35);
    transition: transform 0.15s, box-shadow 0.15s;
    line-height: 1;
  }

  .bnav-btn-add:active .bnav-add-circle {
    transform: scale(0.92);
    box-shadow: 0 2px 8px rgba(201,168,76,0.2);
  }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    /* Header: logo only + search icon */
    header {
      padding: 0 16px;
      height: 52px;
      overflow: visible;
    }

    nav { display: none !important; }
    .btn-add { display: none !important; }
    .search-wrap { display: none !important; }
    .logo { font-size: 16px; white-space: nowrap; }
    .logo-dot { display: none; }
    .btn-theme {
      padding: 5px 10px;
      font-size: 11px;
      flex-shrink: 0;
    }
    .btn-search-mobile {
      width: 32px;
      height: 32px;
      flex-shrink: 0;
    }

    .header-right {
      gap: 8px;
    }

    /* Mobile search toggle button */
    .btn-search-mobile {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--text-muted);
      font-size: 16px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    /* Mobile search bar (full-width dropdown) */
    .mobile-search-bar {
      position: fixed;
      top: 52px;
      left: 0;
      right: 0;
      z-index: 99;
      background: var(--surface);
      border-bottom: 1px solid var(--border2);
      padding: 10px 16px;
      display: none;
    }

    .mobile-search-bar.open { display: flex; gap: 8px; align-items: center; }

    .mobile-search-bar input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--text);
      padding: 10px 14px;
      font-family: 'Noto Serif KR', serif;
      font-size: 15px;
      outline: none;
    }

    .mobile-search-bar input::placeholder { color: var(--text-muted); }

    .mobile-search-bar button {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 18px;
      cursor: pointer;
      padding: 6px;
    }

    /* Show bottom nav */
    .bottom-nav { display: block; }

    /* Page bottom padding for bottom nav */
    .page { padding-bottom: calc(58px + env(safe-area-inset-bottom, 0) + 16px); }

    /* HERO: single column, compact */
    .hero {
      grid-template-columns: 1fr;
      padding: 24px 16px 16px;
      gap: 24px;
    }

    .hero-text h1 { font-size: 30px; }
    .hero-text p { font-size: 13px; }

    .hero-stats {
      gap: 24px;
      margin-top: 24px;
    }

    .stat-num { font-size: 28px; }

    /* Featured: horizontal card on mobile */
    .featured-card {
      display: flex;
      flex-direction: row;
      height: 120px;
    }

    .featured-poster {
      width: 80px;
      height: 120px;
      aspect-ratio: unset;
      flex-shrink: 0;
      font-size: 40px;
    }

    .featured-poster::after {
      background: linear-gradient(to right, rgba(13,12,10,0.0) 0%, transparent 100%);
    }

    .featured-info {
      position: relative;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .featured-title { font-size: 16px; }

    /* SECTION */
    .section { padding: 24px 16px; }
    .section-header { margin-bottom: 20px; }
    .section-title { font-size: 22px; }
    .section-line { display: none; }
    .section-subtitle { font-size: 10px; }

    /* FILM GRID: 3 columns on mobile */
    .film-grid {
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .film-title { font-size: 11px; }
    .film-meta { font-size: 10px; }

    /* FILTER BAR: horizontal scroll */
    .filter-bar {
      flex-wrap: nowrap;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 8px;
      gap: 8px;
      margin-bottom: 20px;
      scrollbar-width: none;
    }
    .filter-bar::-webkit-scrollbar { display: none; }

    .filter-btn {
      white-space: nowrap;
      flex-shrink: 0;
      padding: 6px 14px;
      font-size: 12px;
    }

    /* REVIEW CARD */
    .review-card { padding: 16px; }
    .review-meta h3 { font-size: 15px; }

    /* STATS */
    .stats-grid {
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }

    .stat-card { padding: 16px 10px; }
    .stat-card .big-num { font-size: 32px; }
    .stat-card .label { font-size: 10px; }

    /* Stats bottom grid: stack vertically */
    #page-stats .section > div[style] {
      grid-template-columns: 1fr !important;
    }

    .genre-chart, .calendar-grid { padding: 20px 16px; }

    /* MODAL: slide up from bottom on mobile */
    .modal-overlay { padding: 0; align-items: flex-end; }

    .modal {
      max-width: 100%;
      max-height: 92vh;
      border-radius: 0;
      border-left: none;
      border-right: none;
      border-bottom: none;
      border-top: 1px solid var(--border2);
      animation: slideUpMobile 0.3s ease;
    }

    @keyframes slideUpMobile {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }

    .detail-modal { max-width: 100%; }

    .modal-header { padding: 20px 16px 14px; }
    .modal-body { padding: 16px; }

    .form-group { margin-bottom: 18px; }
    .form-input { font-size: 16px; padding: 12px; } /* 16px prevents iOS zoom */
    textarea.form-input { height: 100px; }

    .form-row { grid-template-columns: 1fr 1fr; gap: 10px; }

    .status-btn { padding: 12px 6px; font-size: 12px; }

    .star-input .star { font-size: 32px; }

    /* Detail modal */
    .detail-top { padding: 16px; gap: 14px; }
    .detail-poster-lg { width: 80px; height: 120px; font-size: 40px; }
    .detail-info h2 { font-size: 20px; }
    .detail-review { padding: 16px; font-size: 14px; }
    .detail-actions { padding: 0 16px 16px; }

    /* TOAST */
    .toast {
      bottom: calc(58px + env(safe-area-inset-bottom, 8px) + 12px);
      left: 16px;
      right: 16px;
      text-align: center;
    }

    /* Logo size */
    .logo { font-size: 18px; }
  }

  /* Prevent tap highlight on all interactive */
  button, a { -webkit-tap-highlight-color: transparent; }

  /* Desktop: hide mobile-only elements */
  .btn-search-mobile { display: none; }
  .mobile-search-bar { display: none; }

  /* ── THREAD (타래) STYLES ── */
  .thread-section {
    padding: 20px 28px;
    border-bottom: 1px solid var(--border);
  }

  .thread-section-title {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--gold);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .thread-section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Timeline list */
  .thread-list {
    display: flex;
    flex-direction: column;
    gap: 0;
    position: relative;
  }

  .thread-item {
    display: flex;
    gap: 14px;
    padding: 0 0 20px 0;
    position: relative;
    animation: fadeIn 0.3s ease;
  }

  /* Vertical line connecting items */
  .thread-item:not(:last-child) .thread-line-wrap::after {
    content: '';
    position: absolute;
    top: 28px;
    left: 11px;
    bottom: 0;
    width: 1px;
    background: var(--border2);
  }

  .thread-line-wrap {
    position: relative;
    flex-shrink: 0;
    width: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .thread-dot {
    width: 24px;
    height: 24px;
    background: var(--surface2);
    border: 1.5px solid var(--gold-dim);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    flex-shrink: 0;
    z-index: 1;
  }

  .thread-body {
    flex: 1;
    padding-top: 2px;
  }

  .thread-text {
    font-size: 14px;
    color: var(--text);
    line-height: 1.7;
    word-break: keep-all;
  }

  .thread-time {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 6px;
  }

  .thread-delete-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 13px;
    cursor: pointer;
    padding: 2px 6px;
    float: right;
    opacity: 0;
    transition: opacity 0.2s, color 0.2s;
  }

  .thread-item:hover .thread-delete-btn { opacity: 1; }
  .thread-delete-btn:hover { color: var(--red); }

  /* Add thread input */
  .thread-input-row {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    margin-top: 4px;
  }

  .thread-input-dot {
    width: 24px;
    height: 24px;
    background: var(--gold);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .thread-input-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .thread-textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--text);
    padding: 10px 12px;
    font-family: 'Noto Serif KR', serif;
    font-size: 14px;
    line-height: 1.7;
    outline: none;
    resize: none;
    min-height: 60px;
    transition: border-color 0.2s, min-height 0.2s;
  }

  .thread-textarea:focus {
    border-color: var(--gold-dim);
    min-height: 80px;
  }

  .thread-textarea::placeholder { color: var(--text-muted); }

  .thread-submit-btn {
    align-self: flex-end;
    padding: 7px 18px;
    background: var(--gold);
    border: none;
    color: #0d0c0a;
    font-family: 'Noto Serif KR', serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }

  .thread-submit-btn:hover { background: var(--gold-light); }

  /* Final review section inside detail */
  .final-review-section {
    padding: 20px 28px 0;
  }

  .final-review-box {
    background: var(--surface2);
    border: 1px solid var(--border2);
    padding: 20px;
    position: relative;
  }

  .final-review-box::before {
    content: '✦ 최종 감상';
    position: absolute;
    top: -10px;
    left: 16px;
    background: var(--surface2);
    padding: 0 8px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--gold);
    letter-spacing: 0.15em;
  }

  .final-review-text {
    font-size: 14px;
    color: var(--text-dim);
    line-height: 2;
    font-weight: 300;
    white-space: pre-wrap;
  }

  .final-review-empty {
    font-size: 13px;
    color: var(--text-muted);
    font-style: italic;
  }

  .btn-write-final {
    width: 100%;
    margin-top: 12px;
    padding: 10px;
    background: none;
    border: 1px dashed var(--border2);
    color: var(--text-muted);
    font-family: 'Noto Serif KR', serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .btn-write-final:hover {
    border-color: var(--gold-dim);
    color: var(--gold);
  }

  /* Final review textarea (inline edit) */
  .final-edit-wrap {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 8px;
  }

  .final-textarea {
    width: 100%;
    background: var(--surface3);
    border: 1px solid var(--gold-dim);
    color: var(--text);
    padding: 14px;
    font-family: 'Noto Serif KR', serif;
    font-size: 14px;
    line-height: 1.9;
    outline: none;
    resize: vertical;
    min-height: 120px;
  }

  .final-textarea::placeholder { color: var(--text-muted); }

  .final-edit-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }

  .btn-final-save {
    padding: 8px 20px;
    background: var(--gold);
    border: none;
    color: #0d0c0a;
    font-family: 'Noto Serif KR', serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
  }

  .btn-final-cancel {
    padding: 8px 16px;
    background: none;
    border: 1px solid var(--border2);
    color: var(--text-muted);
    font-family: 'Noto Serif KR', serif;
    font-size: 12px;
    cursor: pointer;
  }

  /* Thread badge on review card */
  .thread-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--gold);
    margin-left: 8px;
  }

  @media (max-width: 768px) {
    .thread-section { padding: 16px; }
    .thread-delete-btn { opacity: 1; }
    .final-review-section { padding: 16px 16px 0; }
    .thread-text { font-size: 13px; }
  }

  /* ── TYPE TOGGLE (영화 / 시리즈) ── */
  .type-toggle {
    display: flex;
    gap: 0;
    margin-bottom: 24px;
    border: 1px solid var(--border2);
    overflow: hidden;
  }

  .type-toggle-btn {
    flex: 1;
    padding: 10px 0;
    background: none;
    border: none;
    color: var(--text-muted);
    font-family: 'Noto Serif KR', serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.04em;
    position: relative;
  }

  .type-toggle-btn + .type-toggle-btn {
    border-left: 1px solid var(--border2);
  }

  .type-toggle-btn.active {
    background: var(--gold);
    color: #0d0c0a;
    font-weight: 600;
  }

  /* series-specific form fields */
  .series-only { display: none; }
  .series-mode .series-only { display: block; }
  .series-mode .film-only { display: none; }

  /* season/episode badge */
  .ep-badge {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    background: var(--surface2);
    border: 1px solid var(--border2);
    padding: 2px 7px;
    margin-left: 6px;
    vertical-align: middle;
  }

  /* series card style variant */
  .film-card.series-card .film-poster {
    border-color: #3a3060;
  }

  .film-card.series-card:hover .film-poster {
    border-color: #7a6cb0;
  }

  /* page tab switcher on films/series pages */
  .page-type-bar {
    display: flex;
    gap: 0;
    margin-bottom: 28px;
    border-bottom: 1px solid var(--border);
  }

  .page-type-btn {
    padding: 10px 24px;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--text-muted);
    font-family: 'Noto Serif KR', serif;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: -1px;
  }

  .page-type-btn.active {
    color: var(--gold);
    border-bottom-color: var(--gold);
  }

  @media (max-width: 768px) {
    .page-type-btn { padding: 10px 18px; font-size: 13px; }
  }

  /* ── THEME SWITCHER ── */
  .theme-switcher-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 500;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(12px);
    align-items: flex-end;
    justify-content: center;
    padding: 0 0 calc(58px + env(safe-area-inset-bottom,0));
  }
  .theme-switcher-overlay.open { display: flex; }

  .theme-panel {
    width: 100%;
    max-width: 560px;
    background: var(--surface);
    border-top: 1px solid var(--border2);
    padding: 24px 20px 28px;
    animation: slideUpMobile 0.3s ease;
  }

  .theme-panel-title {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 20px;
    text-align: center;
  }

  .theme-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }

  .theme-swatch {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    padding: 10px 6px;
    border: 1px solid var(--border2);
    transition: border-color 0.2s;
    background: none;
    -webkit-tap-highlight-color: transparent;
  }

  .theme-swatch:hover, .theme-swatch.active {
    border-color: var(--accent);
  }

  .theme-swatch.active .swatch-circle::after {
    content: '✓';
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    color: white;
    background: rgba(0,0,0,0.4);
    border-radius: 50%;
  }

  .swatch-circle {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    position: relative;
    flex-shrink: 0;
  }

  .swatch-label {
    font-family: 'Noto Serif KR', serif;
    font-size: 10px;
    color: var(--text-muted);
    text-align: center;
    line-height: 1.3;
    word-break: keep-all;
  }

  .theme-swatch.active .swatch-label { color: var(--accent); }

  .theme-close-btn {
    width: 100%;
    margin-top: 16px;
    padding: 12px;
    background: none;
    border: 1px solid var(--border2);
    color: var(--text-muted);
    font-family: 'Noto Serif KR', serif;
    font-size: 13px;
    cursor: pointer;
  }

  /* theme btn in header */
  .btn-theme {
    background: none;
    border: 1px solid var(--border2);
    color: var(--text-muted);
    padding: 6px 12px;
    font-family: 'Noto Serif KR', serif;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }
  .btn-theme:hover { border-color: var(--accent); color: var(--accent); }

  /* season tabs in detail modal */
  .season-tabs {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    padding: 16px 28px 0;
  }
  .season-tab {
    padding: 5px 14px;
    background: none;
    border: 1px solid var(--border2);
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }
  .season-tab.active {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
    font-weight: 600;
  }
  .season-tab-content {
    display: none;
    padding: 0;
  }
  .season-tab-content.active { display: block; }

  @media (max-width: 768px) {
    .theme-panel { max-width: 100%; }
    .season-tabs { padding: 12px 16px 0; }
  }

  /* ── POSTER IMAGE ── */
  .film-poster img,
  .featured-poster img,
  .detail-poster-lg img,
  .review-poster-sm img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: absolute;
    inset: 0;
  }

  .poster-upload-zone {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    width: 100%;
  }

  .poster-preview-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 2/3;
    background: var(--surface2);
    border: 1px solid var(--border2);
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
  }

  .poster-preview-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: absolute;
    inset: 0;
  }

  .poster-preview-wrap .poster-change-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.55);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.2s;
    font-size: 13px;
    color: white;
    font-family: 'Noto Serif KR', serif;
    letter-spacing: 0.05em;
  }

  .poster-preview-wrap:hover .poster-change-overlay { opacity: 1; }

  .poster-upload-hint {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-align: center;
  }

  .poster-form-row {
    display: grid;
    grid-template-columns: 100px 1fr;
    gap: 16px;
    align-items: start;
  }

  @media (max-width: 480px) {
    .poster-form-row {
      grid-template-columns: 80px 1fr;
      gap: 12px;
    }
  }


  /* ── LOGIN ── */
  .btn-login {
    background: none;
    border: 1px solid var(--border2);
    color: var(--text-muted);
    padding: 6px 12px;
    font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.03em;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .btn-login:hover { border-color: var(--accent); color: var(--accent); }

  .user-avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--accent);
    color: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    border: 2px solid var(--accent);
    flex-shrink: 0;
    transition: opacity 0.2s;
  }
  .user-avatar:hover { opacity: 0.8; }

  .login-modal { max-width: 380px; }

  .login-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    margin-bottom: 20px;
  }
  .login-tab {
    flex: 1;
    padding: 10px;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--text-muted);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: -1px;
    font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
  }
  .login-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .login-error {
    color: var(--red);
    font-size: 12px;
    margin-bottom: 12px;
    display: none;
    padding: 8px 12px;
    background: rgba(201,76,76,0.1);
    border: 1px solid var(--red);
  }
  .login-error.show { display: block; }

  .login-divider {
    text-align: center;
    color: var(--text-muted);
    font-size: 11px;
    margin: 16px 0;
    position: relative;
  }
  .login-divider::before, .login-divider::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 40%;
    height: 1px;
    background: var(--border2);
  }
  .login-divider::before { left: 0; }
  .login-divider::after { right: 0; }

  @media (max-width: 768px) {
    .btn-login { padding: 5px 8px; font-size: 10px; }
  }


  /* ── CALENDAR MONTH NAVIGATOR ── */
  .cal-nav-wrap {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 0 16px;
    gap: 12px;
  }

  .cal-nav-btn {
    width: 40px;
    height: 40px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--text);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }

  .cal-nav-btn:hover { border-color: var(--accent); color: var(--accent); }
  .cal-nav-btn:active { transform: scale(0.92); }

  .cal-nav-title {
    font-size: 20px;
    color: var(--cream);
    font-family: Georgia, serif;
    font-weight: 700;
    display: flex;
    align-items: baseline;
    gap: 8px;
  }

  .cal-nav-count {
    font-family: 'SF Mono', 'Courier New', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.1em;
  }

  /* 캘린더 풀 화면 */
  .cal-fullscreen {
    width: 100%;
  }

  .cal-fullscreen .cal-days-grid {
    gap: 3px;
  }

  .cal-fullscreen .cal-day {
    aspect-ratio: 3/4;
  }


  /* ── 목표 ── */
  .goal-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 20px;
    margin-bottom: 20px;
    position: relative;
  }
  .goal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .goal-title {
    font-family: Georgia, serif;
    font-size: 16px;
    color: var(--cream);
  }
  .goal-edit-btn {
    background: none;
    border: 1px solid var(--border2);
    color: var(--text-muted);
    font-size: 11px;
    padding: 4px 10px;
    cursor: pointer;
    font-family: 'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    transition: all 0.2s;
  }
  .goal-edit-btn:hover { border-color: var(--accent); color: var(--accent); }
  .goal-progress-bar {
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 10px;
  }
  .goal-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent-dim), var(--accent));
    border-radius: 3px;
    transition: width 0.6s ease;
  }
  .goal-meta {
    display: flex;
    justify-content: space-between;
    font-family: 'SF Mono','Courier New',monospace;
    font-size: 11px;
    color: var(--text-muted);
  }
  .goal-num {
    font-family: Georgia, serif;
    font-size: 28px;
    color: var(--accent);
    font-weight: 700;
    line-height: 1;
  }
  .goal-set-wrap {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .goal-input-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  /* ── 월별 통계 ── */
  .monthly-chart {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 20px;
    margin-bottom: 20px;
  }
  .monthly-chart h3 {
    font-family: Georgia, serif;
    font-size: 16px;
    color: var(--cream);
    margin-bottom: 16px;
  }
  .monthly-bars {
    display: flex;
    align-items: flex-end;
    gap: 4px;
    height: 80px;
  }
  .monthly-bar-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    height: 100%;
    justify-content: flex-end;
  }
  .monthly-bar {
    width: 100%;
    background: var(--accent-dim);
    border-radius: 2px 2px 0 0;
    transition: height 0.4s ease;
    min-height: 2px;
    cursor: pointer;
    position: relative;
  }
  .monthly-bar.current { background: var(--accent); }
  .monthly-bar:hover { opacity: 0.8; }
  .monthly-bar-label {
    font-family: 'SF Mono','Courier New',monospace;
    font-size: 9px;
    color: var(--text-muted);
  }
  .monthly-bar-count {
    font-family: 'SF Mono','Courier New',monospace;
    font-size: 9px;
    color: var(--accent);
  }

  /* ── 태그 (감독/배우) ── */
  .tag-input-wrap {
    display: flex;
    gap: 8px;
    margin-top: 8px;
  }
  .tag-input-wrap input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--text);
    padding: 8px 12px;
    font-size: 14px;
    outline: none;
    font-family: 'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
  }
  .tag-input-wrap input:focus { border-color: var(--accent-dim); }
  .tag-add-btn {
    background: var(--accent);
    border: none;
    color: #000;
    padding: 8px 14px;
    font-weight: 700;
    cursor: pointer;
    font-size: 16px;
    flex-shrink: 0;
  }
  .tags-display {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
  }
  .tag-chip {
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--text-muted);
    font-size: 12px;
    padding: 3px 10px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
  }
  .tag-chip-del {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 12px;
    padding: 0;
    line-height: 1;
  }
  .tag-chip-del:hover { color: var(--red); }

  /* ── 명대사 ── */
  .quote-section {
    padding: 20px 28px 0;
  }
  .quote-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 12px;
  }
  .quote-item {
    background: var(--surface2);
    border-left: 3px solid var(--accent);
    padding: 12px 14px;
    position: relative;
    margin-bottom: 8px;
  }
  .quote-item.no-speaker { border-left-color: var(--border2); }
  .quote-speaker {
    font-family: 'SF Mono','Courier New',monospace;
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 0.1em;
    margin-bottom: 5px;
  }
  .quote-text {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.7;
    font-style: italic;
  }
  .quote-context {
    font-size: 11px;
    color: var(--text-muted);
    line-height: 1.6;
    border-top: 1px solid var(--border);
    padding-top: 7px;
    margin-top: 7px;
  }
  .quote-context::before {
    content: '상황 — ';
    color: var(--border2);
    font-family: 'SF Mono',monospace;
    font-size: 9px;
  }
  .quote-del {
    position: absolute;
    top: 8px;
    right: 8px;
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 12px;
    opacity: 0;
    transition: opacity 0.2s;
    padding: 2px 4px;
  }
  .quote-item:hover .quote-del { opacity: 1; }
  .quote-del:hover { color: var(--red); }
  .quote-input-row {
    display: flex;
    gap: 8px;
  }
  .quote-input-row textarea {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--text);
    padding: 10px 12px;
    font-size: 13px;
    font-style: italic;
    resize: none;
    height: 60px;
    outline: none;
    font-family: 'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    line-height: 1.6;
  }
  .quote-input-row textarea:focus { border-color: var(--accent-dim); }
  .quote-submit {
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--accent);
    padding: 0 14px;
    cursor: pointer;
    font-size: 18px;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .quote-submit:hover { background: var(--accent); color: #000; border-color: var(--accent); }

  /* ── 카드 이미지 저장 ── */
  .card-export-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    width: 100%;
    padding: 11px 16px;
    background: none;
    border: 1px solid var(--border2);
    color: var(--text-muted);
    font-family: 'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 12px;
    justify-content: center;
  }
  .card-export-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* 카드 미리보기 (숨김 — 캡처용) */
  #shareCardCanvas {
    position: fixed;
    left: -9999px;
    top: -9999px;
    z-index: -1;
  }

  @media (max-width: 768px) {
    .quote-section { padding: 16px 16px 0; }
    .quote-del { opacity: 1; }
    .goal-input-row { grid-template-columns: 1fr; }
  }


  /* ── A. 필름누아르 ── */
  body.theme-noir {
    background: #0a0a0a !important;
    color: #e8e8e8 !important;
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #181818;
    --surface3: #202020;
    --border: #2a2a2a;
    --border2: #333333;
    --accent: #e8e8e8;
    --accent-light: #ffffff;
    --accent-dim: #888888;
    --red: #ff5555;
    --cream: #f5f5f5;
    --cream-dim: #aaaaaa;
    --cream-muted: #666666;
    --text: #e8e8e8;
    --text-dim: #aaaaaa;
    --text-muted: #666666;
  }

  /* ── E. 먹(墨) ── */
  body.theme-ink {
    background: #f7f4ee !important;
    color: #2d2a24 !important;
    --bg: #f7f4ee;
    --surface: #f0ece4;
    --surface2: #e8e4dc;
    --surface3: #dedad2;
    --border: #d8d3c8;
    --border2: #c8c3b8;
    --accent: #2d2a24;
    --accent-light: #4a4640;
    --accent-dim: #6a6658;
    --red: #c04040;
    --cream: #1a1810;
    --cream-dim: #4a4640;
    --cream-muted: #7a7668;
    --text: #2d2a24;
    --text-dim: #5a5648;
    --text-muted: #9a9688;
  }

  /* ── H. 아이보리 ── */
  body.theme-ivory {
    background: #faf7f2 !important;
    color: #3a3020 !important;
    --bg: #faf7f2;
    --surface: #f4f0e8;
    --surface2: #ece8de;
    --surface3: #e4e0d4;
    --border: #d8d0c0;
    --border2: #c8c0b0;
    --accent: #b8860b;
    --accent-light: #d4a020;
    --accent-dim: #8a6208;
    --red: #c04040;
    --cream: #2a2010;
    --cream-dim: #5a5040;
    --cream-muted: #8a8070;
    --text: #3a3020;
    --text-dim: #6a6050;
    --text-muted: #9a9080;
  }

  /* ── G. 포레스트 ── */
  body.theme-forest {
    background: #0c1a0e !important;
    color: #b8e8c0 !important;
    --bg: #0c1a0e;
    --surface: #102014;
    --surface2: #162a1a;
    --surface3: #1c3220;
    --border: #243c28;
    --border2: #2e4e34;
    --accent: #7ec88a;
    --accent-light: #a0e0aa;
    --accent-dim: #4a8858;
    --red: #e06060;
    --cream: #d0f0d8;
    --cream-dim: #88b890;
    --cream-muted: #507858;
    --text: #b8e8c0;
    --text-dim: #88b890;
    --text-muted: #507858;
  }


  /* ── 타래 이미지 ── */
  .thread-img-btn {
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--text-muted);
    padding: 7px 12px;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.2s;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .thread-img-btn:hover { border-color: var(--accent); color: var(--accent); }

  .thread-input-actions {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .thread-img-preview {
    width: 100%;
    max-height: 180px;
    object-fit: cover;
    margin-top: 6px;
    border: 1px solid var(--border2);
    display: none;
  }

  .thread-item-img {
    width: 100%;
    max-height: 200px;
    object-fit: cover;
    margin-top: 8px;
    border-radius: 2px;
    border: 1px solid var(--border2);
  }

  .thread-img-clear {
    font-size: 10px;
    color: var(--text-muted);
    background: none;
    border: none;
    cursor: pointer;
    padding: 2px 6px;
    display: none;
  }


  /* ── 관람 기록 / 시즌 기록 ── */
  .viewing-section {
    padding: 16px 28px;
    border-bottom: 1px solid var(--border);
  }

  .viewing-count {
    font-family: 'SF Mono', 'Courier New', monospace;
    font-size: 10px;
    color: var(--text-muted);
    margin-bottom: 10px;
    letter-spacing: 0.1em;
  }
  .viewing-count span { color: var(--accent); }

  .viewing-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 10px;
  }

  .viewing-item {
    background: var(--surface2);
    border: 1px solid var(--border2);
    padding: 10px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .viewing-num {
    font-family: 'SF Mono', 'Courier New', monospace;
    font-size: 10px;
    color: var(--accent);
    background: var(--surface3);
    border: 1px solid var(--border2);
    padding: 2px 7px;
    flex-shrink: 0;
  }

  .viewing-dates {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 5px;
    font-family: 'SF Mono', 'Courier New', monospace;
    font-size: 11px;
    color: var(--text-dim);
    flex-wrap: wrap;
  }

  .viewing-arrow { color: var(--text-muted); }

  .viewing-end-btn {
    background: none;
    border: 1px dashed var(--border2);
    color: var(--text-muted);
    font-size: 10px;
    padding: 2px 7px;
    cursor: pointer;
    font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .viewing-end-btn:hover { border-color: var(--accent); color: var(--accent); }

  .viewing-del {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 13px;
    cursor: pointer;
    padding: 2px 4px;
    flex-shrink: 0;
    opacity: 0.5;
    transition: all 0.2s;
  }
  .viewing-del:hover { color: var(--red); opacity: 1; }

  .viewing-add-btn {
    width: 100%;
    padding: 9px;
    background: none;
    border: 1px dashed var(--border2);
    color: var(--text-muted);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    -webkit-tap-highlight-color: transparent;
  }
  .viewing-add-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* 시즌 아이템 */
  .season-record-item {
    background: var(--surface2);
    border: 1px solid var(--border2);
    padding: 12px;
    margin-bottom: 6px;
    position: relative;
  }

  .season-record-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }

  .season-record-badge {
    font-family: 'SF Mono', 'Courier New', monospace;
    font-size: 11px;
    color: #000;
    background: var(--accent);
    padding: 2px 8px;
    font-weight: 700;
    flex-shrink: 0;
  }

  .season-record-status {
    font-size: 9px;
    padding: 2px 7px;
    border: 1px solid;
    font-family: 'SF Mono', 'Courier New', monospace;
    letter-spacing: 0.05em;
  }
  .sr-watched { color: var(--accent); border-color: var(--accent-dim); }
  .sr-watching { color: var(--red); border-color: var(--red); }
  .sr-want { color: var(--text-muted); border-color: var(--border2); }

  .season-record-body {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .season-record-dates {
    flex: 1;
    font-family: 'SF Mono', 'Courier New', monospace;
    font-size: 11px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .season-record-stars {
    font-size: 12px;
    color: var(--accent);
    letter-spacing: 1px;
  }

  .season-record-del {
    position: absolute;
    top: 8px;
    right: 8px;
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 12px;
    cursor: pointer;
    opacity: 0.4;
    transition: all 0.2s;
  }
  .season-record-del:hover { color: var(--red); opacity: 1; }

  /* 관람/시즌 추가 미니 폼 */
  .inline-form {
    background: var(--surface3);
    border: 1px solid var(--border2);
    padding: 14px;
    margin-top: 8px;
    animation: fadeIn 0.2s ease;
  }

  .inline-form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 10px;
  }

  .inline-form-label {
    font-family: 'SF Mono', 'Courier New', monospace;
    font-size: 9px;
    color: var(--accent);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    display: block;
    margin-bottom: 5px;
  }

  .inline-form input,
  .inline-form select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--text);
    padding: 8px 10px;
    font-size: 13px;
    font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    outline: none;
  }

  .inline-form input:focus,
  .inline-form select:focus { border-color: var(--accent-dim); }

  .inline-form-hint {
    font-size: 10px;
    color: var(--text-muted);
    margin-bottom: 10px;
  }

  .inline-star-input {
    display: flex;
    gap: 4px;
    font-size: 22px;
  }

  .inline-star-input .star {
    color: var(--border2);
    cursor: pointer;
    transition: color 0.1s;
  }
  .inline-star-input .star.filled { color: var(--accent); }

  .inline-form-actions {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }

  .btn-inline-save {
    flex: 1;
    padding: 9px;
    background: var(--accent);
    border: none;
    color: #000;
    font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
  }

  .btn-inline-cancel {
    padding: 9px 14px;
    background: none;
    border: 1px solid var(--border2);
    color: var(--text-muted);
    font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    font-size: 12px;
    cursor: pointer;
  }

  @media (max-width: 768px) {
    .viewing-section { padding: 16px; }
    .viewing-del { opacity: 1; }
    .season-record-del { opacity: 1; }
  }


  /* ── 컬렉션 ── */
  .page-tab-bar {
    display: flex;
    gap: 0;
    margin-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .page-tab-btn {
    padding: 10px 20px;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--text-muted);
    font-family: 'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: -1px;
  }
  .page-tab-btn.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  .collection-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }

  .collection-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 16px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .collection-card:hover { border-color: var(--accent-dim); }

  .collection-emoji {
    font-size: 28px;
    margin-bottom: 8px;
    display: block;
  }

  .collection-name {
    font-family: Georgia, serif;
    font-size: 14px;
    color: var(--cream);
    margin-bottom: 4px;
    word-break: break-all;
  }

  .collection-count {
    font-family: 'SF Mono','Courier New',monospace;
    font-size: 10px;
    color: var(--text-muted);
  }

  .collection-del-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 12px;
    cursor: pointer;
    opacity: 0;
    transition: all 0.2s;
    padding: 2px 5px;
  }
  .collection-card:hover .collection-del-btn { opacity: 1; }
  .collection-del-btn:hover { color: var(--red); }

  .collection-new-btn {
    border: 1px dashed var(--border2);
    background: none;
    padding: 16px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    color: var(--text-muted);
    font-family: 'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    font-size: 12px;
    min-height: 90px;
  }
  .collection-new-btn:hover { border-color: var(--accent); color: var(--accent); }
  .collection-new-btn .plus { font-size: 24px; }

  .collection-detail-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
  }
  .collection-back-btn {
    background: none;
    border: 1px solid var(--border2);
    color: var(--text-muted);
    padding: 6px 12px;
    font-size: 12px;
    cursor: pointer;
    font-family: 'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    transition: all 0.2s;
  }
  .collection-back-btn:hover { border-color: var(--accent); color: var(--accent); }
  .collection-detail-title {
    font-family: Georgia, serif;
    font-size: 18px;
    color: var(--cream);
  }

  /* 기록에 추가 버튼 */
  .add-to-collection-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    width: 100%;
    padding: 10px 16px;
    background: none;
    border: 1px solid var(--border2);
    color: var(--text-muted);
    font-family: 'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
    justify-content: center;
  }
  .add-to-collection-btn:hover { border-color: var(--accent); color: var(--accent); }
  .add-to-collection-btn.in-collection { border-color: var(--accent-dim); color: var(--accent); }

  .collection-picker {
    background: var(--surface2);
    border: 1px solid var(--border2);
    padding: 12px;
    margin-top: 4px;
  }
  .collection-picker-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 10px;
    cursor: pointer;
    border-radius: 2px;
    transition: background 0.15s;
    font-size: 13px;
    color: var(--text-dim);
  }
  .collection-picker-item:hover { background: var(--surface3); }
  .collection-picker-item.active { color: var(--accent); }
  .collection-picker-check { font-size: 14px; }

  @media (max-width: 768px) {
    .collection-del-btn { opacity: 1; }
    .collection-card:hover > div[style*='opacity'] { opacity: 1 !important; }
    .collection-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
  }


  /* ── 타래 핸들 & 드래그 ── */
  .thread-item {
    cursor: default;
  }
  .thread-handle {
    display: flex;
    flex-direction: column;
    gap: 3px;
    padding: 6px 4px;
    cursor: grab;
    flex-shrink: 0;
    opacity: 0.25;
    transition: opacity 0.2s;
    touch-action: none;
    align-self: flex-start;
    margin-top: 2px;
  }
  .thread-item:hover .thread-handle { opacity: 0.7; }
  .thread-handle span {
    display: block;
    width: 13px;
    height: 2px;
    background: var(--accent);
    border-radius: 1px;
  }
  .thread-item.dragging { opacity: 0.35; }
  .thread-item.drag-over-top { border-top: 2px solid var(--accent); }
  .thread-item.drag-over-bot { border-bottom: 2px solid var(--accent); }

  /* ── 점선 구분선 (N화 끝) ── */
  .thread-divider-ep {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 0;
    cursor: grab;
    animation: fadeIn 0.2s ease;
  }
  .thread-divider-ep.dragging { opacity: 0.35; }
  .divider-ep-label {
    font-family: 'SF Mono','Courier New',monospace;
    font-size: 10px;
    color: var(--accent-dim);
    flex-shrink: 0;
    letter-spacing: 0.08em;
    white-space: nowrap;
  }
  .divider-ep-line {
    flex: 1;
    border-top: 1px dashed var(--border2);
  }
  .divider-ep-del {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 11px;
    cursor: pointer;
    opacity: 0;
    flex-shrink: 0;
    padding: 2px 4px;
    transition: opacity 0.2s;
  }
  .thread-divider-ep:hover .divider-ep-del { opacity: 1; }

  /* ── 직선 구분선 (N회차) ── */
  .thread-divider-view {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 0;
    cursor: grab;
    animation: fadeIn 0.2s ease;
  }
  .thread-divider-view.dragging { opacity: 0.35; }
  .divider-view-line {
    flex: 1;
    border-top: 2px solid var(--border2);
  }
  .divider-view-label {
    font-family: Georgia, serif;
    font-size: 11px;
    color: var(--accent);
    flex-shrink: 0;
    white-space: nowrap;
    letter-spacing: 0.05em;
  }
  .divider-view-del {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 11px;
    cursor: pointer;
    opacity: 0;
    flex-shrink: 0;
    padding: 2px 4px;
    transition: opacity 0.2s;
  }
  .thread-divider-view:hover .divider-view-del { opacity: 1; }

  /* ── 구분선 버튼 ── */
  .btn-divider-ep {
    padding: 7px 10px;
    background: none;
    border: 1px dashed var(--border2);
    color: var(--accent-dim);
    font-size: 11px;
    cursor: pointer;
    font-family: 'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    transition: all 0.2s;
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-divider-ep:hover { border-color: var(--accent); color: var(--accent); }

  .btn-divider-view {
    padding: 7px 10px;
    background: none;
    border: 1px solid var(--border2);
    color: var(--text-muted);
    font-size: 11px;
    cursor: pointer;
    font-family: 'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    transition: all 0.2s;
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-divider-view:hover { border-color: var(--accent); color: var(--accent); }

  @media (max-width: 768px) {
    .thread-handle { opacity: 0.5; }
    .divider-ep-del { opacity: 1; }
    .divider-view-del { opacity: 1; }
    .thread-input-actions { flex-wrap: wrap; gap: 6px; }
    .btn-divider-ep, .btn-divider-view { font-size: 10px; padding: 6px 8px; }
  }


  /* ── 다회차 최종 감상 ── */
  .final-review-list {
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-bottom: 12px;
  }

  .final-review-item {
    border: 1px solid var(--border);
    background: var(--surface);
    padding: 14px;
    position: relative;
  }

  .final-review-item-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }

  .final-review-badge {
    font-family: 'SF Mono','Courier New',monospace;
    font-size: 10px;
    color: #000;
    background: var(--accent);
    padding: 2px 8px;
    font-weight: 700;
    flex-shrink: 0;
  }

  .final-review-date {
    font-family: 'SF Mono','Courier New',monospace;
    font-size: 10px;
    color: var(--text-muted);
    flex: 1;
  }

  .final-review-item-text {
    font-size: 14px;
    color: var(--text-dim);
    line-height: 1.8;
    white-space: pre-wrap;
    word-break: keep-all;
  }

  .final-review-item-actions {
    display: flex;
    gap: 6px;
    margin-top: 10px;
  }

  .btn-review-edit {
    background: none;
    border: 1px solid var(--border2);
    color: var(--text-muted);
    font-size: 11px;
    padding: 4px 10px;
    cursor: pointer;
    font-family: 'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    transition: all 0.2s;
  }
  .btn-review-edit:hover { border-color: var(--accent); color: var(--accent); }

  .btn-review-del {
    background: none;
    border: 1px solid var(--border2);
    color: var(--text-muted);
    font-size: 11px;
    padding: 4px 10px;
    cursor: pointer;
    font-family: 'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    transition: all 0.2s;
  }
  .btn-review-del:hover { border-color: var(--red); color: var(--red); }

  .btn-add-review {
    width: 100%;
    padding: 10px;
    background: none;
    border: 1px dashed var(--border2);
    color: var(--text-muted);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .btn-add-review:hover { border-color: var(--accent); color: var(--accent); }

  .final-review-inline-form {
    background: var(--surface2);
    border: 1px solid var(--border2);
    padding: 14px;
    margin-top: 8px;
    animation: fadeIn 0.2s ease;
  }

  .final-review-inline-form textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border2);
    color: var(--text);
    padding: 10px 12px;
    font-size: 14px;
    resize: none;
    height: 100px;
    outline: none;
    font-family: 'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    line-height: 1.7;
    margin-bottom: 10px;
  }
  .final-review-inline-form textarea:focus { border-color: var(--accent-dim); }

  .final-review-form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 10px;
  }


  /* ── 태그 자동완성 ── */
  .tag-autocomplete {
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-top: none;
    z-index: 999;
    max-height: 160px;
    overflow-y: auto;
  }
  .tag-autocomplete-item {
    padding: 9px 12px;
    font-size: 13px;
    color: var(--text-dim);
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .tag-autocomplete-item:hover,
  .tag-autocomplete-item.active {
    background: var(--surface3);
    color: var(--accent);
  }
  .tag-autocomplete-highlight {
    color: var(--accent);
    font-weight: 700;
  }
  .tag-input-wrap {
    position: relative;
  }


  /* ── 백업 모달 ── */
  #backupModal .modal { max-height: 80vh; overflow-y: auto; }


  /* ── 캘린더 날짜 상세 패널 ── */
  .cal-detail-panel {
    border: 1px solid var(--border);
    border-radius: 0;
    overflow: hidden;
    margin-top: 12px;
    animation: fadeIn 0.2s ease;
  }
  .cal-detail-header {
    padding: 10px 16px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
  }
  .cal-detail-item {
    display: flex;
    align-items: center;
    gap: 12px;

    // 로그인 상태 감지

        try {
          const db = firebase.firestore();
          const uid = user.uid;
          var snap = await db.collection('users').doc(uid).get();
          var loaded = false;

          // 1. 메인에서 불러오기
          if (snap.exists) {
            const data = snap.data();
            if (data.films && data.films.length > 0) {
              // 로컬에 이미지가 있으면 병합
              var localFilms = JSON.parse(localStorage.getItem('cinelog_films') || '[]');
              var merged = data.films.map(function(rf) {
                var lf = localFilms.find(function(l) { return l.id === rf.id; });
                if (lf && lf.posterImg) rf.posterImg = lf.posterImg;
                if (lf && lf.thread) {
                  rf.thread = rf.thread ? rf.thread.map(function(rt) {

          if (!loaded) {

              var bsnap = await db.collection('users').doc(uid).collection('backups')
                .orderBy('backupAt', 'desc').limit(1).get();
              if (!bsnap.empty) {

                if (bdata.films && bdata.films.length > 0) {

                  films = bdata.films;

                  loaded = true;

                  });
