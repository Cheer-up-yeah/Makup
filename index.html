  if (document.getElementById('page-stats').classList.contains('active')) renderStats();
}

// THREAD FUNCTIONS
// 타래 이미지 임시 저장
const threadImgCache = {};

function handleThreadImg(filmId, input) {
  const file = input.files[0];
  if (!file) return;
  const isGif = file.type === 'image/gif';
  const reader = new FileReader();
  reader.onload = function(e) {
    if (isGif) {
      // GIF는 원본 그대로 유지 (움직임 보존)
      threadImgCache[filmId] = e.target.result;
      const preview = document.getElementById('threadImgPreview-' + filmId);
      const clearBtn = document.getElementById('threadImgClear-' + filmId);
      if (preview) { preview.src = e.target.result; preview.style.display = 'block'; }
      if (clearBtn) clearBtn.style.display = 'inline';
    } else {
      // 일반 이미지는 리사이즈 후 저장
      const img = new Image();
      img.onload = function() {
        const maxW = 800, maxH = 600;
        let w = img.width, h = img.height;
        if (w > maxW || h > maxH) {
          const ratio = Math.min(maxW/w, maxH/h);
          w = Math.round(w*ratio); h = Math.round(h*ratio);
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
        threadImgCache[filmId] = dataUrl;
        const preview = document.getElementById('threadImgPreview-' + filmId);
        const clearBtn = document.getElementById('threadImgClear-' + filmId);
        if (preview) { preview.src = dataUrl; preview.style.display = 'block'; }
        if (clearBtn) clearBtn.style.display = 'inline';
      };
      img.src = e.target.result;
    }
  };
  reader.readAsDataURL(file);
  input.value = '';
}

function clearThreadImg(filmId) {
  delete threadImgCache[filmId];
  const preview = document.getElementById('threadImgPreview-' + filmId);
  const clearBtn = document.getElementById('threadImgClear-' + filmId);
  if (preview) { preview.src = ''; preview.style.display = 'none'; }
  if (clearBtn) clearBtn.style.display = 'none';
}

function addThread(filmId) {
  const ta = document.getElementById('threadInput-' + filmId);
  const text = ta.value.trim();
  const img = threadImgCache[filmId] || null;
  if (!text && !img) { showToast('텍스트나 이미지를 추가해봐요'); return; }
  const f = films.find(x => x.id === filmId);
  if (!f) return;
  if (!f.thread) f.thread = [];
  const now = new Date();
  const time = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
  f.thread.push({ id: 't' + Date.now(), text, time, img });
  saveData();
  ta.value = '';
  clearThreadImg(filmId);
  renderThreadList(filmId);
  renderReviews();
  showToast('타래 추가 ✓');
}

function deleteThread(filmId, threadId) {
  const f = films.find(x => x.id === filmId);
  if (!f) return;
  f.thread = f.thread.filter(t => t.id !== threadId);
  saveData();
  renderThreadList(filmId);
  renderReviews();
}

function renderThreadList(filmId) {
  const f = films.find(x => x.id === filmId);
  const container = document.getElementById('threadList-' + filmId);
  if (!container || !f) return;
  const items = f.thread || [];
  if (items.length === 0) {
    container.innerHTML = `<div style="color:var(--text-muted);font-size:12px;padding:8px 0 4px;font-family:'DM Mono',monospace;">아직 타래가 없어요. 영화 보면서 남겨봐요!</div>`;

  container.innerHTML = items.map((t, i) => `
    <div class="thread-item">
      <div class="thread-line-wrap">
        <div class="thread-dot">${i + 1}</div>
      </div>
      <div class="thread-body">
        <button class="thread-delete-btn" onclick="deleteThread(${filmId}, '${t.id}')">✕</button>
        ${t.text ? `<div class="thread-text">${t.text}</div>` : ''}
        ${t.img ? `<img class="thread-item-img" src="${t.img}" alt="타래 이미지" loading="lazy">` : ''}

  `).join('');
}

// ── 한국 기준 현재 연도 ──
function getKoreanYear() {
  // UTC+9 기준 현재 날짜
  const now = new Date();
  const kst = new Date(now.getTime() + 9 * 60 * 60 * 1000);
  return kst.getUTCFullYear();
}

function getKoreanToday() {
  const now = new Date();
  const kst = new Date(now.getTime() + 9 * 60 * 60 * 1000);
  const y = kst.getUTCFullYear();
  const m = String(kst.getUTCMonth() + 1).padStart(2, '0');
  const d = String(kst.getUTCDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

function applyTheme(theme) {
  const v = THEME_VARS[theme] || THEME_VARS.default;
  const root = document.documentElement;
  root.style.setProperty('--bg', v.bg);
  root.style.setProperty('--surface', v.surface);
  root.style.setProperty('--surface2', v.surface2);
  root.style.setProperty('--surface3', v.surface3);
  root.style.setProperty('--border', v.border);
  root.style.setProperty('--border2', v.border2);
  root.style.setProperty('--accent', v.accent);
  root.style.setProperty('--accent-light', v.accentLight);
  root.style.setProperty('--accent-dim', v.accentDim);
  root.style.setProperty('--gold', v.accent);
  root.style.setProperty('--gold-light', v.accentLight);
  root.style.setProperty('--gold-dim', v.accentDim);
  root.style.setProperty('--red', v.red);
  root.style.setProperty('--cream', v.cream);
  root.style.setProperty('--cream-dim', v.creamDim);
  root.style.setProperty('--cream-muted', v.creamMuted);
  root.style.setProperty('--text', v.text);
  root.style.setProperty('--text-dim', v.textDim);
  root.style.setProperty('--text-muted', v.textMuted);
  document.body.style.background = v.bg;
  document.body.style.color = v.text;
  currentTheme = theme;
  localStorage.setItem('cinelog_theme', theme);
  THEMES.forEach(t => {
    const sw = document.getElementById('swatch-' + t);
    if (sw) sw.classList.toggle('active', t === theme);
  });
}

        <div class="goal-set-wrap">
          <div class="goal-input-row">
            <div class="form-group" style="margin:0">
              <label class="form-label">목표 편수</label>
              <input type="number" class="form-input" id="goalCount" placeholder="50" min="1">
            </div>
            <div class="form-group" style="margin:0">
              <label class="form-label">기간</label>
              <select class="form-input" id="goalPeriod" onchange="document.getElementById('goalCustomDates').style.display=this.value==='custom'?'grid':'none'">
                <option value="year">올해</option>
                <option value="month">이번달</option>
                <option value="custom">직접 설정</option>
              </select>
            </div>
          </div>
          <div id="goalCustomDates" style="display:none" class="goal-input-row">
            <div class="form-group" style="margin:0">
              <label class="form-label">시작일</label>
              <input type="date" class="form-input" id="goalStart">
            </div>
            <div class="form-group" style="margin:0">
              <label class="form-label">종료일</label>
              <input type="date" class="form-input" id="goalEnd">
            </div>
          </div>
          <button class="btn-save" style="margin-top:4px" onclick="saveGoalForm()">목표 설정</button>
        </div>
      </div>`;

    return;
  }

  // 기간 내 관람 수 계산
  let periodWatched = watched;
  let periodLabel = '';
  const today = getKoreanToday();
  if (goal.period === 'year') {
    const y = getKoreanYear();
    periodWatched = watched.filter(f => f.date && f.date.startsWith(y + ''));
    periodLabel = y + '년';
  } else if (goal.period === 'month') {
    const ym = today.slice(0, 7);
    periodWatched = watched.filter(f => f.date && f.date.startsWith(ym));
    periodLabel = ym.replace('-', '년 ') + '월';
  } else if (goal.start && goal.end) {
    periodWatched = watched.filter(f => f.date && f.date >= goal.start && f.date <= goal.end);
    periodLabel = goal.start + ' ~ ' + goal.end;
  }

  const cnt = periodWatched.length;
  const target = goal.count;
  const pct = Math.min(Math.round(cnt / target * 100), 100);
  const done = cnt >= target;

  el.innerHTML = `
    <div class="goal-card">
      <div class="goal-header">
        <div>
          <div style="font-size:11px;color:var(--text-muted);font-family:'SF Mono','Courier New',monospace;margin-bottom:4px">${periodLabel}</div>
          <div class="goal-title">${done ? '🎉 ' : ''}목표 ${target}편${done ? ' 달성!' : ''}</div>
        </div>
        <button class="goal-edit-btn" onclick="localStorage.removeItem('mak_goal');renderStats()">재설정</button>
      </div>
      <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:12px">
        <span class="goal-num">${cnt}</span>
        <span style="color:var(--text-muted);font-size:13px">/ ${target}편</span>
        <span style="color:var(--accent);font-family:'SF Mono','Courier New',monospace;font-size:12px">${pct}%</span>
      </div>
      <div class="goal-progress-bar">
        <div class="goal-progress-fill" style="width:${pct}%"></div>
      </div>
      <div class="goal-meta">
        <span>${target - cnt > 0 ? '앞으로 ' + (target - cnt) + '편 더!' : '목표 완료 ✓'}</span>
        <span>${periodLabel}</span>
      </div>
    </div>`;
}

function saveGoalForm() {
  const count = parseInt(document.getElementById('goalCount').value);
  if (!count || count < 1) { showToast('편수를 입력해주세요'); return; }
  const period = document.getElementById('goalPeriod').value;
  const goal = { count, period };
  if (period === 'custom') {
    goal.start = document.getElementById('goalStart').value;
    goal.end = document.getElementById('goalEnd').value;
    if (!goal.start || !goal.end) { showToast('날짜를 선택해주세요'); return; }
  }
  saveGoal(goal);
  renderStats();
  showToast('목표 설정 완료 ✓');
}

// ── 태그 (감독/배우) ──
let formTags = [];

function addFormTag() {
  const input = document.getElementById('inputTagText');
  const val = input.value.trim();
  if (!val) return;
  if (!formTags.includes(val)) formTags.push(val);
  input.value = '';
  renderFormTags();
}

function removeFormTag(tag) {
  formTags = formTags.filter(t => t !== tag);
  renderFormTags();
}

function removeFormTagByIndex(i) {
  formTags.splice(i, 1);
  renderFormTags();
}

function renderFormTags() {
  const el = document.getElementById('formTagsDisplay');
  if (!el) return;
  el.innerHTML = formTags.map((t, i) =>
    '<div class="tag-chip">' + t +
    '<button class="tag-chip-del" onclick="removeFormTagByIndex(' + i + ')">✕</button></div>'
  ).join('');
}

// ── 명대사 ──
function addQuote(filmId) {
  const ta = document.getElementById('quoteInput-' + filmId);
  const text = ta.value.trim();
  if (!text) return;
  const f = films.find(x => x.id === filmId);
  if (!f) return;
  if (!f.quotes) f.quotes = [];
  f.quotes.push({ id: 'q' + Date.now(), text });
  saveData();
  ta.value = '';
  renderQuoteList(filmId);
  showToast('명대사 저장 ✓');
}

function deleteQuote(filmId, quoteId) {
  const f = films.find(x => x.id === filmId);
  if (!f) return;
  f.quotes = (f.quotes || []).filter(q => q.id !== quoteId);
  saveData();
  renderQuoteList(filmId);
}

function renderQuoteList(filmId) {
  const f = films.find(x => x.id === filmId);
  const el = document.getElementById('quoteList-' + filmId);
  if (!el || !f) return;
  const quotes = f.quotes || [];
  if (quotes.length === 0) {
    el.innerHTML = '<div style="color:var(--text-muted);font-size:12px;font-family:\'SF Mono\',\'Courier New\',monospace">기억에 남는 대사를 남겨봐요</div>';
    return;
  }
  el.innerHTML = quotes.map(q =>
    '<div class="quote-item">' +
    '<div class="quote-text">' + q.text + '</div>' +
    '<button class="quote-del" onclick="deleteQuote(' + filmId + ',\'' + q.id + '\')">✕</button>' +
    '</div>'
  ).join('');
}

// ── 감상문 카드 이미지 저장 ──
function exportCard(filmId) {
  const f = films.find(x => x.id === filmId);
  if (!f) return;

  const stars = '★'.repeat(f.rating) + '☆'.repeat(5 - f.rating);
  const review = f.review || '감상문 없음';
  const quote = (f.quotes && f.quotes[0]) ? '"' + f.quotes[0].text + '"' : '';

  const w = 800, h = 1000;
  const canvas = document.createElement('canvas');
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');

  // 배경
  ctx.fillStyle = '#0d0c0a';
  ctx.fillRect(0, 0, w, h);

  // 포스터 영역
  if (f.posterImg) {
    const img = new Image();
    img.onload = () => {
      ctx.drawImage(img, 0, 0, w, 420);
      // 그라데이션 오버레이
      const grad = ctx.createLinearGradient(0, 200, 0, 420);
      grad.addColorStop(0, 'transparent');
      grad.addColorStop(1, '#0d0c0a');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 200, w, 220);
      drawCardText(ctx, f, stars, review, quote, w, h);
      downloadCanvas(canvas, f.title);
    };
    img.src = f.posterImg;
  } else {
    // 이모지 포스터
    ctx.fillStyle = '#1e1b17';
    ctx.fillRect(0, 0, w, 380);
    ctx.font = '120px serif';
    ctx.textAlign = 'center';
    ctx.fillText(f.emoji || '🎬', w/2, 220);
    drawCardText(ctx, f, stars, review, quote, w, h);
    downloadCanvas(canvas, f.title);
  }
  showToast('카드 저장 중...');
}

function drawCardText(ctx, f, stars, review, quote, w, h) {
  ctx.textAlign = 'left';

  // 골드 라인
  ctx.fillStyle = '#c9a84c';
  ctx.fillRect(40, 430, 60, 2);

  // 제목
  ctx.fillStyle = '#f0e8d8';
  ctx.font = 'bold 44px Georgia, serif';
  ctx.fillText(f.title, 40, 490);

  // 연도 · 장르
  ctx.fillStyle = '#6e6860';
  ctx.font = '22px "SF Mono", monospace';
  ctx.fillText((f.year || '') + (f.genre ? '  ·  ' + f.genre : ''), 40, 530);

  // 별점
  ctx.fillStyle = '#c9a84c';
  ctx.font = '28px serif';
  ctx.fillText(stars, 40, 575);

  // 명대사
  if (quote) {
    ctx.fillStyle = '#9a9080';
    ctx.font = 'italic 22px Georgia, serif';
    wrapText(ctx, quote, 40, 625, w - 80, 30);
  }

  // 감상문
  ctx.fillStyle = '#b0a898';
  ctx.font = '20px "Apple SD Gothic Neo", sans-serif';
  const reviewLines = wrapText(ctx, review, 40, quote ? 700 : 625, w - 80, 28, true);

  // 하단 로고
  ctx.fillStyle = '#3a3428';
  ctx.fillRect(0, h - 60, w, 60);
  ctx.fillStyle = '#c9a84c';
  ctx.font = 'bold 20px Georgia, serif';
  ctx.textAlign = 'center';
  ctx.fillText('막이 오르다', w/2, h - 22);
}

function wrapText(ctx, text, x, y, maxW, lineH, returnOnly) {
  const words = text.split('');
  let line = '', lineY = y, lines = 0;
  for (let i = 0; i < words.length; i++) {
    const test = line + words[i];
    if (ctx.measureText(test).width > maxW && line) {
      if (!returnOnly) ctx.fillText(line, x, lineY);
      line = words[i]; lineY += lineH; lines++;
      if (lines > 5) { if (!returnOnly) ctx.fillText(line + '...', x, lineY); return; }
    } else { line = test; }
  }
  if (!returnOnly) ctx.fillText(line, x, lineY);
}

function downloadCanvas(canvas, title) {
  const a = document.createElement('a');
  a.download = (title || 'card') + '_감상카드.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
  showToast('카드 저장 완료! 📷');
}

// ── CALENDAR MONTH NAVIGATION ──
let calYear = getKoreanYear();
let calMonth = new Date().getMonth(); // 0-indexed, 현재 월

function renderCalendarMonth() {
  const calEl = document.getElementById('calendarGrid');
  if (!calEl) return;

  const months = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const weekDays = ['일','월','화','수','목','금','토'];
  const YEAR = calYear;
  const M = calMonth;

  // 라벨 업데이트
  const monthLabel = document.getElementById('calMonthLabel');
  const yearLabel = document.getElementById('calYearLabel');
  const countLabel = document.getElementById('calMonthCount');
  if (monthLabel) monthLabel.textContent = months[M];
  if (yearLabel) yearLabel.textContent = YEAR;

  // date → films map
  const dateMap = {};
  films.filter(f => f.date && f.status !== 'want').forEach(f => {
    if (!dateMap[f.date]) dateMap[f.date] = [];
    dateMap[f.date].push(f);
  });

  // 이 달 기록 수 계산
  const monthRecords = Object.entries(dateMap).filter(([d]) => {
    const [y, m] = d.split('-').map(Number);
    return y === YEAR && m - 1 === M;
  });
  const monthCount = monthRecords.reduce((s, [, arr]) => s + arr.length, 0);
  if (countLabel) countLabel.textContent = monthCount > 0 ? monthCount + '편' : '';

  const daysInMonth = new Date(YEAR, M + 1, 0).getDate();
  const firstDow = new Date(YEAR, M, 1).getDay();

  let html = '<div class="cal-week-header">' + weekDays.map(d => `<div class="cal-week-day">${d}</div>`).join('') + '</div>';
  html += '<div class="cal-days-grid">';

  for (let i = 0; i < firstDow; i++) {
    html += '<div class="cal-day empty"></div>';
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = YEAR + '-' + String(M + 1).padStart(2, '0') + '-' + String(d).padStart(2, '0');
    const dayFilms = dateMap[dateStr] || [];
    const f = dayFilms[0];

    if (dayFilms.length > 0) {
      const poster = f.posterImg
        ? '<img src="' + f.posterImg + '" alt="' + (f.title || '') + '" loading="lazy">'
        : '<div class="cal-day-emoji">' + (f.emoji || '🎬') + '</div>';
      const multi = dayFilms.length > 1 ? '<div class="cal-day-multi">+' + (dayFilms.length - 1) + '</div>' : '';
      html += '<div class="cal-day has-record" onclick="openDetail(' + f.id + ')" title="' + dayFilms.map(x => x.title).join(', ') + '">'
        + poster
        + '<div class="cal-day-overlay"></div>'
        + '<div class="cal-day-num">' + d + '</div>'
        + '<div class="cal-day-title">' + f.title + '</div>'
        + multi
        + '</div>';
    } else {
      html += '<div class="cal-day"><div class="cal-day-num">' + d + '</div></div>';
    }
  }

  html += '</div>';
  calEl.innerHTML = html;
}

function calPrevMonth() {
  calMonth--;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  renderCalendarMonth();
}

function calNextMonth() {
  calMonth++;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  renderCalendarMonth();
}

// ── LOGIN (Firebase) ──
// currentUser는 window.currentUser 사용

function updateLoginUI() {
  const wrap = document.getElementById('loginBtnWrap');
  if (!wrap) return;
  const user = window.currentUser;
  if (user) {
    const initial = (user.nickname || user.email || '?')[0].toUpperCase();
    wrap.innerHTML = '<button class="user-avatar" onclick="openProfileMenu()">' + initial + '</button>';
  } else {
    wrap.innerHTML = '<button class="btn-login" onclick="openLoginModal()">👤 로그인</button>';
  }
}

function openLoginModal() {
  document.getElementById('loginEmail').value = '';
  document.getElementById('loginPassword').value = '';
  document.getElementById('loginNickname').value = '';
  document.getElementById('loginError').classList.remove('show');
  switchLoginTab('login');
  document.getElementById('loginModal').classList.add('open');
}

function switchLoginTab(tab) {
  document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
  document.getElementById('tabSignup').classList.toggle('active', tab === 'signup');
  document.getElementById('signupNameGroup').style.display = tab === 'signup' ? '' : 'none';
  document.getElementById('loginSubmitBtn').textContent = tab === 'login' ? '로그인' : '회원가입';
  document.getElementById('loginModalTitle').textContent = tab === 'login' ? '로그인' : '회원가입';
  document.getElementById('loginError').classList.remove('show');
}

async function handleLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const nickname = document.getElementById('loginNickname').value.trim();
  const isSignup = document.getElementById('tabSignup').classList.contains('active');
  const errEl = document.getElementById('loginError');
  const btn = document.getElementById('loginSubmitBtn');

  if (!email || !password) { errEl.textContent = '이메일과 비밀번호를 입력해주세요.'; errEl.classList.add('show'); return; }
  if (password.length < 6) { errEl.textContent = '비밀번호는 6자 이상이어야 해요.'; errEl.classList.add('show'); return; }

  btn.textContent = '처리중...';
  btn.disabled = true;

  try {
    const user = window.currentUser;
  const auth = window._fbAuth;
    if (isSignup) {
      const cred = await window._fbCreateUser(auth, email, password);
      const nick = nickname || email.split('@')[0];
      await window._fbUpdateProfile(cred.user, { displayName: nick });
      // Firestore에 초기 데이터 저장
      await window._fbSetDoc(window._fbDoc(window._fbDb, 'users', cred.user.uid), { films: films, updatedAt: Date.now() });
      showToast('가입 완료! 환영해요 🎬');
    } else {
      await window._fbSignIn(auth, email, password);
      showToast('로그인됐어요 🎬');
    }
    closeModal('loginModal');
  } catch(e) {
    const msgs = {
      'auth/email-already-in-use': '이미 가입된 이메일이에요.',
      'auth/user-not-found': '가입된 계정이 없어요.',
      'auth/wrong-password': '비밀번호가 틀렸어요.',
      'auth/invalid-email': '이메일 형식이 올바르지 않아요.',
      'auth/invalid-credential': '이메일 또는 비밀번호가 틀렸어요.',
      'auth/too-many-requests': '잠시 후 다시 시도해주세요.',
    };
    errEl.textContent = msgs[e.code] || '오류가 발생했어요: ' + e.message;
    errEl.classList.add('show');
  } finally {
    btn.textContent = isSignup ? '회원가입' : '로그인';
    btn.disabled = false;
  }
}

function handleGuestMode() {
  window.currentUser = null;
  closeModal('loginModal');
  showToast('게스트 모드로 이용 중이에요');
}

async function openProfileMenu() {
  if (!window.currentUser) return;
  if (confirm(window.currentUser.nickname + '님, 로그아웃 할까요?')) {
    try {
      await window._fbSignOut(window._fbAuth);
      films = [];
      saveData();
      renderHome();
      showToast('로그아웃됐어요');
    } catch(e) { showToast('오류: ' + e.message); }
  }
}

// Firestore 저장은 saveData() 함수에 통합됨
window._saveData = function() {
  localStorage.setItem('cinelog_films', JSON.stringify(films));
};

// ── INIT ──
applyTheme(currentTheme);
if (!window.currentUser) updateLoginUI();
// 기존 저장 데이터 마이그레이션
films = films.map(f => ({
  ...f,
  type: f.type || 'film',
  posterImg: f.posterImg || null,
  thread: f.thread || [],
  quotes: f.quotes || [],
  tags: f.tags || [],
}));
renderHome();
</script>
