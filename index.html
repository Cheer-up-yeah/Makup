<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>막이 오르다</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Noto+Serif+KR:wght@300;400;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  /* ── DEFAULT THEME: 버닝 (Dark Gold) ── */
  :root {
    --bg: #0d0c0a;
    --surface: #161410;
    --surface2: #1e1b17;
    --surface3: #252118;
    --border: #2e2920;
    --border2: #3a3428;
    --accent: #c9a84c;
    --accent-light: #e4c97a;
    --accent-dim: #7a6530;
    --red: #c94c4c;
    --cream: #f0e8d8;
    --cream-dim: #9a9080;
    --cream-muted: #6a6058;
    --text: #ede6d8;
    --text-dim: #b0a898;
    --text-muted: #6e6860;
    /* legacy aliases */
    --gold: var(--accent);
    --gold-light: var(--accent-light);
    --gold-dim: var(--accent-dim);
  }

/* ── THEME 2: 문라이트 (Midnight Blue) ── */
body.theme-moonlight {
background: #08090f !important;
color: #d8dfff !important;
–bg: #08090f;
–surface: #0f1120;
–surface2: #161829;
–surface3: #1c1f33;
–border: #232640;
–border2: #2e3260;
–accent: #6c8fff;
–accent-light: #99b2ff;
–accent-dim: #3a4ea0;
–red: #ff6b6b;
–cream: #d8dfff;
–cream-dim: #8890b8;
–cream-muted: #555c80;
–text: #d8dfff;
–text-dim: #9aa0c8;
–text-muted: #5a6090;
}

/* ── THEME 3: 벚꽃 (Sakura) ── */
body.theme-sakura {
background: #f9f3f5 !important;
color: #3a1a22 !important;
–bg: #f9f3f5;
–surface: #fff0f3;
–surface2: #fce4ea;
–surface3: #f8d6df;
–border: #f0c8d4;
–border2: #e8b0c0;
–accent: #c4607a;
–accent-light: #e0899c;
–accent-dim: #a04060;
–red: #c4607a;
–cream: #3a1a22;
–cream-dim: #6a3a48;
–cream-muted: #9a6a78;
–text: #3a1a22;
–text-dim: #6a3a48;
–text-muted: #b08090;
}

/* ── THEME 4: 매트릭스 (Terminal Green) ── */
body.theme-matrix {
background: #010a04 !important;
color: #b8ffcc !important;
–bg: #010a04;
–surface: #041008;
–surface2: #071a0c;
–surface3: #0a2212;
–border: #0f3018;
–border2: #164020;
–accent: #00e55a;
–accent-light: #4dff8a;
–accent-dim: #007a30;
–red: #ff4444;
–cream: #b8ffcc;
–cream-dim: #70c888;
–cream-muted: #3a7a50;
–text: #b8ffcc;
–text-dim: #70c888;
–text-muted: #3a7a50;
}

/* ── THEME 5: 노을 (Sunset) ── */
body.theme-sunset {
background: #12080e !important;
color: #ffddd0 !important;
–bg: #12080e;
–surface: #1e0e18;
–surface2: #2a1420;
–surface3: #361a28;
–border: #4a2038;
–border2: #5e2a48;
–accent: #ff7c4a;
–accent-light: #ffaa80;
–accent-dim: #a04020;
–red: #ff4a6a;
–cream: #ffddd0;
–cream-dim: #c0907a;
–cream-muted: #806050;
–text: #ffddd0;
–text-dim: #c8a090;
–text-muted: #806050;
}

- { margin: 0; padding: 0; box-sizing: border-box; }

body {
background: var(–bg);
color: var(–text);
font-family: ‘Noto Serif KR’, serif;
min-height: 100vh;
overflow-x: hidden;
}

/* SCROLLBAR */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(–bg); }
::-webkit-scrollbar-thumb { background: var(–border2); border-radius: 2px; }

/* NOISE OVERLAY */
body::before {
content: ‘’;
position: fixed;
inset: 0;
background-image: url(“data:image/svg+xml,%3Csvg viewBox=‘0 0 256 256’ xmlns=‘http://www.w3.org/2000/svg’%3E%3Cfilter id=‘n’%3E%3CfeTurbulence type=‘fractalNoise’ baseFrequency=‘0.9’ numOctaves=‘4’ stitchTiles=‘stitch’/%3E%3C/filter%3E%3Crect width=‘100%25’ height=‘100%25’ filter=‘url(%23n)’ opacity=‘0.04’/%3E%3C/svg%3E”);
pointer-events: none;
z-index: 9999;
opacity: 0.5;
}

/* HEADER */
header {
position: sticky;
top: 0;
z-index: 100;
background: color-mix(in srgb, var(–bg) 92%, transparent);
backdrop-filter: blur(20px);
border-bottom: 1px solid var(–border);
padding: 0 40px;
display: flex;
align-items: center;
justify-content: space-between;
height: 64px;
}

.logo {
font-family: ‘Playfair Display’, serif;
font-size: 22px;
font-weight: 700;
letter-spacing: 0.08em;
color: var(–gold);
display: flex;
align-items: center;
gap: 10px;
cursor: pointer;
}

.logo-dot {
width: 6px;
height: 6px;
background: var(–gold);
border-radius: 50%;
animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
0%, 100% { opacity: 1; transform: scale(1); }
50% { opacity: 0.4; transform: scale(0.8); }
}

nav {
display: flex;
align-items: center;
gap: 32px;
}

nav button {
background: none;
border: none;
color: var(–text-muted);
font-family: ‘Noto Serif KR’, serif;
font-size: 13px;
letter-spacing: 0.05em;
cursor: pointer;
transition: color 0.2s;
padding: 4px 0;
position: relative;
}

nav button::after {
content: ‘’;
position: absolute;
bottom: -2px;
left: 0;
width: 0;
height: 1px;
background: var(–gold);
transition: width 0.3s;
}

nav button:hover { color: var(–cream); }
nav button:hover::after { width: 100%; }
nav button.active { color: var(–gold); }
nav button.active::after { width: 100%; }

.header-right {
display: flex;
align-items: center;
gap: 16px;
}

.btn-add {
background: var(–gold);
color: #0d0c0a;
border: none;
padding: 8px 20px;
font-family: ‘Noto Serif KR’, serif;
font-size: 12px;
font-weight: 600;
letter-spacing: 0.08em;
cursor: pointer;
transition: all 0.2s;
clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
}

.btn-add:hover {
background: var(–gold-light);
transform: translateY(-1px);
}

/* SEARCH BAR */
.search-wrap {
position: relative;
display: flex;
align-items: center;
}

.search-wrap input {
background: var(–surface2);
border: 1px solid var(–border2);
color: var(–text);
padding: 8px 36px 8px 14px;
font-family: ‘Noto Serif KR’, serif;
font-size: 12px;
width: 200px;
outline: none;
transition: all 0.3s;
}

.search-wrap input:focus {
border-color: var(–gold-dim);
width: 260px;
background: var(–surface3);
}

.search-wrap input::placeholder { color: var(–text-muted); }

.search-icon {
position: absolute;
right: 10px;
color: var(–text-muted);
font-size: 14px;
pointer-events: none;
}

/* PAGES */
.page { display: none; animation: fadeIn 0.4s ease; }
.page.active { display: block; }

@keyframes fadeIn {
from { opacity: 0; transform: translateY(8px); }
to { opacity: 1; transform: translateY(0); }
}

/* HERO */
.hero {
padding: 80px 40px 60px;
max-width: 1200px;
margin: 0 auto;
display: grid;
grid-template-columns: 1fr 1fr;
gap: 80px;
align-items: center;
}

.hero-text h1 {
font-family: ‘Playfair Display’, serif;
font-size: 56px;
line-height: 1.15;
color: var(–cream);
margin-bottom: 20px;
}

.hero-text h1 em {
font-style: italic;
color: var(–gold);
}

.hero-text p {
color: var(–text-muted);
font-size: 15px;
line-height: 1.9;
max-width: 400px;
font-weight: 300;
}

.hero-stats {
display: flex;
gap: 40px;
margin-top: 40px;
}

.stat-item {
text-align: center;
}

.stat-num {
font-family: ‘DM Mono’, monospace;
font-size: 36px;
color: var(–gold);
font-weight: 300;
display: block;
}

.stat-label {
font-size: 11px;
color: var(–text-muted);
letter-spacing: 0.12em;
text-transform: uppercase;
margin-top: 4px;
}

/* FEATURED FILM */
.featured-card {
position: relative;
background: var(–surface);
border: 1px solid var(–border2);
overflow: hidden;
cursor: pointer;
transition: transform 0.3s;
}

.featured-card:hover { transform: translateY(-4px); }

.featured-poster {
width: 100%;
aspect-ratio: 2/3;
background: linear-gradient(135deg, #1a1510 0%, #2d2518 50%, #1a1510 100%);
display: flex;
align-items: center;
justify-content: center;
font-size: 80px;
position: relative;
overflow: hidden;
}

.featured-poster::after {
content: ‘’;
position: absolute;
inset: 0;
background: linear-gradient(to top, rgba(13,12,10,0.9) 0%, transparent 60%);
}

.featured-info {
position: absolute;
bottom: 0;
left: 0;
right: 0;
padding: 24px;
z-index: 2;
}

.featured-tag {
font-family: ‘DM Mono’, monospace;
font-size: 10px;
color: var(–gold);
letter-spacing: 0.2em;
text-transform: uppercase;
margin-bottom: 8px;
}

.featured-title {
font-family: ‘Playfair Display’, serif;
font-size: 20px;
color: var(–cream);
margin-bottom: 8px;
}

.featured-rating {
display: flex;
align-items: center;
gap: 6px;
}

/* SECTION LAYOUT */
.section {
max-width: 1200px;
margin: 0 auto;
padding: 60px 40px;
}

.section-header {
display: flex;
align-items: baseline;
gap: 16px;
margin-bottom: 40px;
}

.section-title {
font-family: ‘Playfair Display’, serif;
font-size: 28px;
color: var(–cream);
}

.section-subtitle {
font-size: 12px;
color: var(–text-muted);
font-family: ‘DM Mono’, monospace;
letter-spacing: 0.1em;
}

.section-line {
flex: 1;
height: 1px;
background: var(–border);
}

/* FILM GRID */
.film-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
gap: 24px;
}

.film-card {
cursor: pointer;
transition: all 0.25s;
position: relative;
}

.film-card:hover { transform: translateY(-6px); }
.film-card:hover .film-overlay { opacity: 1; }

.film-poster {
width: 100%;
aspect-ratio: 2/3;
background: var(–surface2);
display: flex;
align-items: center;
justify-content: center;
font-size: 48px;
border: 1px solid var(–border);
position: relative;
overflow: hidden;
transition: border-color 0.2s;
}

.film-card:hover .film-poster {
border-color: var(–gold-dim);
}

.film-overlay {
position: absolute;
inset: 0;
background: rgba(201, 168, 76, 0.15);
display: flex;
align-items: center;
justify-content: center;
opacity: 0;
transition: opacity 0.25s;
font-size: 28px;
}

.film-status {
position: absolute;
top: 8px;
right: 8px;
padding: 3px 8px;
font-family: ‘DM Mono’, monospace;
font-size: 9px;
letter-spacing: 0.1em;
font-weight: 400;
}

.status-watched { background: var(–gold); color: #0d0c0a; }
.status-want { background: transparent; color: var(–gold); border: 1px solid var(–gold-dim); }
.status-watching { background: var(–red); color: white; }

.film-info {
padding: 12px 4px 4px;
}

.film-title {
font-size: 13px;
color: var(–text);
font-weight: 600;
line-height: 1.4;
margin-bottom: 4px;
}

.film-meta {
font-family: ‘DM Mono’, monospace;
font-size: 11px;
color: var(–text-muted);
}

/* STAR RATING */
.stars {
display: flex;
gap: 2px;
align-items: center;
}

.star {
color: var(–border2);
font-size: 13px;
transition: color 0.15s;
cursor: pointer;
user-select: none;
}

.star.filled { color: var(–gold); }
.star.half { color: var(–gold); opacity: 0.6; }

/* REVIEW FEED */
.review-feed {
display: flex;
flex-direction: column;
gap: 20px;
}

.review-card {
background: var(–surface);
border: 1px solid var(–border);
padding: 28px;
transition: border-color 0.2s;
cursor: pointer;
position: relative;
overflow: hidden;
}

.review-card::before {
content: ‘’;
position: absolute;
left: 0;
top: 0;
bottom: 0;
width: 2px;
background: var(–gold);
transform: scaleY(0);
transition: transform 0.3s;
transform-origin: top;
}

.review-card:hover { border-color: var(–border2); }
.review-card:hover::before { transform: scaleY(1); }

.review-header {
display: flex;
align-items: flex-start;
gap: 16px;
margin-bottom: 16px;
}

.review-poster-sm {
width: 48px;
height: 72px;
background: var(–surface2);
border: 1px solid var(–border2);
display: flex;
align-items: center;
justify-content: center;
font-size: 24px;
flex-shrink: 0;
}

.review-meta h3 {
font-family: ‘Playfair Display’, serif;
font-size: 17px;
color: var(–cream);
margin-bottom: 6px;
}

.review-date {
font-family: ‘DM Mono’, monospace;
font-size: 11px;
color: var(–text-muted);
margin-top: 6px;
}

.review-text {
font-size: 14px;
color: var(–text-dim);
line-height: 1.9;
font-weight: 300;
display: -webkit-box;
-webkit-line-clamp: 3;
-webkit-box-orient: vertical;
overflow: hidden;
}

.review-tags {
margin-top: 16px;
display: flex;
gap: 8px;
flex-wrap: wrap;
}

.tag {
padding: 3px 10px;
background: var(–surface2);
border: 1px solid var(–border2);
font-size: 11px;
color: var(–text-muted);
font-family: ‘DM Mono’, monospace;
letter-spacing: 0.05em;
}

/* FILTER BAR */
.filter-bar {
display: flex;
gap: 12px;
margin-bottom: 32px;
flex-wrap: wrap;
align-items: center;
}

.filter-btn {
padding: 6px 16px;
background: none;
border: 1px solid var(–border2);
color: var(–text-muted);
font-family: ‘Noto Serif KR’, serif;
font-size: 12px;
cursor: pointer;
transition: all 0.2s;
}

.filter-btn:hover, .filter-btn.active {
background: var(–gold);
color: #0d0c0a;
border-color: var(–gold);
font-weight: 600;
}

/* STATS PAGE */
.stats-grid {
display: grid;
grid-template-columns: repeat(3, 1fr);
gap: 20px;
margin-bottom: 40px;
}

.stat-card {
background: var(–surface);
border: 1px solid var(–border);
padding: 28px;
text-align: center;
}

.stat-card .big-num {
font-family: ‘Playfair Display’, serif;
font-size: 48px;
color: var(–gold);
font-weight: 400;
display: block;
line-height: 1;
margin-bottom: 8px;
}

.stat-card .label {
font-size: 12px;
color: var(–text-muted);
letter-spacing: 0.1em;
font-family: ‘DM Mono’, monospace;
}

/* GENRE BAR CHART */
.genre-chart {
background: var(–surface);
border: 1px solid var(–border);
padding: 32px;
margin-bottom: 20px;
}

.genre-chart h3 {
font-family: ‘Playfair Display’, serif;
font-size: 18px;
color: var(–cream);
margin-bottom: 24px;
}

.genre-bar-row {
display: flex;
align-items: center;
gap: 14px;
margin-bottom: 14px;
}

.genre-label {
font-family: ‘DM Mono’, monospace;
font-size: 12px;
color: var(–text-muted);
width: 60px;
text-align: right;
flex-shrink: 0;
}

.genre-bar-track {
flex: 1;
height: 6px;
background: var(–surface2);
position: relative;
overflow: hidden;
}

.genre-bar-fill {
height: 100%;
background: linear-gradient(90deg, var(–gold-dim), var(–gold));
transition: width 1s ease;
}

.genre-count {
font-family: ‘DM Mono’, monospace;
font-size: 12px;
color: var(–gold);
width: 24px;
flex-shrink: 0;
}

/* ── POSTER CALENDAR ── */
.poster-calendar {
width: 100%;
}

.cal-month-block {
margin-bottom: 36px;
}

.cal-month-name {
font-family: ‘Playfair Display’, serif;
font-size: 18px;
color: var(–cream);
margin-bottom: 12px;
display: flex;
align-items: baseline;
gap: 10px;
}

.cal-month-count {
font-family: ‘DM Mono’, monospace;
font-size: 11px;
color: var(–accent);
letter-spacing: 0.1em;
}

.cal-week-header {
display: grid;
grid-template-columns: repeat(7, 1fr);
gap: 3px;
margin-bottom: 3px;
}

.cal-week-day {
font-family: ‘DM Mono’, monospace;
font-size: 9px;
color: var(–text-muted);
text-align: center;
padding: 3px 0;
letter-spacing: 0.05em;
}

.cal-week-day:first-child { color: #e06060; }
.cal-week-day:last-child { color: #6080e0; }

.cal-days-grid {
display: grid;
grid-template-columns: repeat(7, 1fr);
gap: 3px;
}

.cal-day {
aspect-ratio: 3/4;
position: relative;
border: 1px solid var(–border);
background: var(–surface2);
overflow: hidden;
cursor: default;
transition: transform 0.15s;
}

.cal-day.empty {
background: transparent;
border-color: transparent;
}

.cal-day.has-record {
border-color: var(–accent-dim);
cursor: pointer;
}

.cal-day.has-record:hover {
transform: scale(1.06);
z-index: 2;
border-color: var(–accent);
}

.cal-day-num {
position: absolute;
top: 3px;
left: 4px;
font-family: ‘DM Mono’, monospace;
font-size: 8px;
color: var(–text-muted);
z-index: 2;
line-height: 1;
}

.cal-day.has-record .cal-day-num {
color: var(–cream);
text-shadow: 0 1px 3px rgba(0,0,0,0.8);
}

.cal-day img {
width: 100%;
height: 100%;
object-fit: cover;
position: absolute;
inset: 0;
}

.cal-day-emoji {
position: absolute;
inset: 0;
display: flex;
align-items: center;
justify-content: center;
font-size: 18px;
}

.cal-day-overlay {
position: absolute;
inset: 0;
background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 50%);
z-index: 1;
}

.cal-day-title {
position: absolute;
bottom: 2px;
left: 3px;
right: 3px;
font-size: 7px;
color: white;
z-index: 2;
line-height: 1.2;
font-family: ‘Noto Serif KR’, serif;
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
}

/* 여러 편 겹칠 때 스택 표시 */
.cal-day-multi {
position: absolute;
top: 3px;
right: 3px;
background: var(–accent);
color: #000;
font-family: ‘DM Mono’, monospace;
font-size: 7px;
font-weight: 700;
width: 14px;
height: 14px;
border-radius: 50%;
display: flex;
align-items: center;
justify-content: center;
z-index: 3;
}

.cal-empty-month {
color: var(–text-muted);
font-size: 12px;
font-family: ‘DM Mono’, monospace;
padding: 8px 0;
letter-spacing: 0.08em;
}

/* month dot (old) alias for compat */
.month-label { display: none; }
.month-dots { display: none; }
.cal-dot { display: none; }

@media (max-width: 768px) {
.cal-month-name { font-size: 15px; }
.cal-day-emoji { font-size: 14px; }
.cal-days-grid { gap: 2px; }
.cal-week-header { gap: 2px; }
}

/* MODAL */
.modal-overlay {
display: none;
position: fixed;
inset: 0;
background: rgba(0,0,0,0.82);
z-index: 1000;
align-items: center;
justify-content: center;
padding: 40px;
backdrop-filter: blur(8px);
}

.modal-overlay.open { display: flex; }

.modal {
background: var(–surface);
border: 1px solid var(–border2);
width: 100%;
max-width: 560px;
max-height: 80vh;
overflow-y: auto;
animation: slideUp 0.3s ease;
}

@keyframes slideUp {
from { opacity: 0; transform: translateY(20px); }
to { opacity: 1; transform: translateY(0); }
}

.modal-header {
padding: 28px 28px 20px;
border-bottom: 1px solid var(–border);
display: flex;
justify-content: space-between;
align-items: center;
}

.modal-header h2 {
font-family: ‘Playfair Display’, serif;
font-size: 22px;
color: var(–cream);
}

.modal-close {
background: none;
border: none;
color: var(–text-muted);
font-size: 22px;
cursor: pointer;
transition: color 0.2s;
line-height: 1;
}

.modal-close:hover { color: var(–cream); }

.modal-body { padding: 28px; }

.form-group { margin-bottom: 24px; }

.form-label {
display: block;
font-family: ‘DM Mono’, monospace;
font-size: 11px;
color: var(–gold);
letter-spacing: 0.15em;
text-transform: uppercase;
margin-bottom: 10px;
}

.form-input {
width: 100%;

.form-row {

.star-input {

.status-select {

.status-btn {

/* TOAST */
.toast {
position: fixed;
bottom: 40px;
right: 40px;
background: var(–surface3);
border: 1px solid var(–gold-dim);
color: var(–cream);
padding: 14px 24px;
font-size: 13px;
font-family: ‘Noto Serif KR’, serif;
z-index: 9000;
transform: translateY(20px);
opacity: 0;
transition: all 0.3s;
pointer-events: none;
}

.toast.show { transform: translateY(0); opacity: 1; }

width: 40px;

.bottom-nav {
display: none;
position: fixed;
bottom: 0;
left: 0;
right: 0;
z-index: 200;
background: color-mix(in srgb, var(–bg) 97%, transparent);
backdrop-filter: blur(20px);
border-top: 1px solid var(–border2);
padding: 0 0 env(safe-area-inset-bottom, 0);
}

.bottom-nav-inner {

.bnav-btn {

align-items: center;
justify-content: center;

}

.bnav-btn .bnav-icon { font-size: 20px; line-height: 1; }
.bnav-btn.active { color: var(–gold); }

.bnav-btn-add {
flex: 1;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
gap: 4px;
background: none;
border: none;

-webkit-tap-highlight-color: transparent;
padding: 0;
}

.bnav-add-circle {
width: 44px;
height: 44px;
background: var(–gold);
border-radius: 50%;

align-items: center;
justify-content: center;

color: #0d0c0a;

<script>
// DATA
let films = JSON.parse(localStorage.getItem('cinelog_films') || '[]');
let currentRating = 0;
let currentStatus = '';
let currentType = 'film';
let editingId = null;
let currentPosterImg = null; // base64 or null

// 샘플 데이터 없음 — 직접 기록을 추가해요

function saveData() {
  // migrate: type 기본값만 보장, 기존 값은 보존
  films = films.map(f => ({ type: 'film', ...f, type: f.type || 'film' }));
  localStorage.setItem('cinelog_films', JSON.stringify(films));
}

// RENDER STARS
function renderStars(rating, size = 13) {
  let html = '';
  for (let i = 1; i <= 5; i++) {
    const cls = i <= rating ? 'filled' : '';
    html += `<span class="star ${cls}" style="font-size:${size}px">★</span>`;
  }
  return html;
}

// MOBILE SEARCH
function toggleMobileSearch() {
  const bar = document.getElementById('mobileSearchBar');
  bar.classList.toggle('open');
  if (bar.classList.contains('open')) {
    document.getElementById('mobileSearchInput').focus();
  } else {
    document.getElementById('mobileSearchInput').value = '';
  }
}

// TYPE TOGGLE (영화 / 시리즈)
function setType(type, btn) {
  currentType = type;
  document.getElementById('typeBtnFilm').classList.toggle('active', type === 'film');
  document.getElementById('typeBtnSeries').classList.toggle('active', type === 'series');
  const body = document.getElementById('modalBody');
  // toggle series-only fields
  body.querySelectorAll('.series-only').forEach(el => el.style.display = type === 'series' ? '' : 'none');
  // show correct film-only labels
  body.querySelectorAll('.film-only').forEach(el => el.style.display = type === 'film' ? '' : 'none');
  // update watched label
  const watchedBtn = body.querySelector('.watched-label');
  if (watchedBtn) watchedBtn.textContent = type === 'series' ? '✓ 완주' : '✓ 봤어요';
  // update date label
  const dateLabel = body.querySelector('.date-label');
  if (dateLabel) dateLabel.textContent = type === 'series' ? '시청 시작일' : '관람 날짜';
  // update emoji placeholder
  document.getElementById('inputEmoji').placeholder = type === 'series' ? '📺' : '🎬';
}

// SHOW PAGE
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  const navBtn = document.getElementById('nav-' + name);
  if (navBtn) navBtn.classList.add('active');
  // Bottom nav sync
  document.querySelectorAll('.bnav-btn').forEach(b => b.classList.remove('active'));
  const bnavBtn = document.getElementById('bnav-' + name);
  if (bnavBtn) bnavBtn.classList.add('active');
  // Scroll to top
  window.scrollTo({ top: 0, behavior: 'smooth' });
  if (name === 'home') renderHome();
  if (name === 'films') renderFilms('film');
  if (name === 'series') renderFilms('series');
  if (name === 'reviews') renderReviews();
  if (name === 'stats') renderStats();
}

// HOME
function renderHome() {
  const watched = films.filter(f => f.status === 'watched');
  const withReview = films.filter(f => f.review && f.review.length > 0);
  const rated = watched.filter(f => f.rating > 0);
  const avgRating = rated.length > 0 ? (rated.reduce((s, f) => s + f.rating, 0) / rated.length).toFixed(1) : '—';
  document.getElementById('heroWatched').textContent = watched.filter(f => (f.type||'film')==='film').length;
  document.getElementById('heroReviews').textContent = films.filter(f => (f.type||'film')==='series').length;
  document.getElementById('heroAvg').textContent = avgRating !== 'NaN' ? avgRating : '—';

  // Featured
  const featured = watched.filter(f => f.rating >= 4)[0] || watched[0];
  const featuredEl = document.getElementById('featuredFilm');
  if (featured) {
    featuredEl.innerHTML = `
      <div class="featured-card" onclick="openDetail(${featured.id})">
        <div class="featured-poster">${featured.posterImg ? `<img src="${featured.posterImg}" alt="${featured.title}" style="width:100%;height:100%;object-fit:cover;position:absolute;inset:0">` : (featured.emoji || '🎬')}</div>
        <div class="featured-info">
          <div class="featured-tag">✦ FEATURED</div>
          <div class="featured-title">${featured.title}</div>
          <div class="featured-rating">
            <div class="stars">${renderStars(featured.rating)}</div>
            <span style="font-family:'DM Mono',monospace;font-size:11px;color:var(--text-muted)">${featured.year}</span>
          </div>
        </div>
      </div>
    `;
  } else {

}

// FILM GRID
function renderFilmGrid(id, list) {
  const el = document.getElementById(id);
  const isSeries = list.length > 0 && (list[0].type === 'series');
  const emptyIcon = isSeries ? '📺' : '🎞';
  const emptyMsg = isSeries ? '기록된 시리즈가 없어요.' : '기록된 영화가 없어요.';
  if (list.length === 0) {
    el.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">${emptyIcon}</div><p>${emptyMsg}<br>첫 번째 기록을 추가해보세요!</p></div>`;
    return;
  }
  const statusMap = {
    watched: ['status-watched', '봤어요'],
    want: ['status-want', '보고싶어요'],
    watching: ['status-watching', '보는중']
  };
  const seriesStatusMap = {
    watched: ['status-watched', '완주'],
    want: ['status-want', '보고싶어요'],
    watching: ['status-watching', '보는중']
  };
  el.innerHTML = list.map(f => {
    const isSer = f.type === 'series';
    const map = isSer ? seriesStatusMap : statusMap;
    const [cls, label] = map[f.status] || ['', ''];
    const epPct = (isSer && f.totalEp) ? Math.round((f.watchedEp||0)/f.totalEp*100) : 0;
    const epBar = (isSer && f.totalEp && f.status === 'watching') ? `
      <div style="margin-top:5px;height:3px;background:var(--border2);border-radius:2px;overflow:hidden">
        <div style="width:${epPct}%;height:100%;background:var(--gold)"></div>
      </div>
      <div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--text-muted);margin-top:2px">${f.watchedEp||0}/${f.totalEp} EP</div>
    ` : '';
    const seasonBadge = (isSer && f.seasons > 1) ? `<span style="font-family:'DM Mono',monospace;font-size:9px;color:var(--text-muted)"> S${f.currentSeason||1}</span>` : '';
    return `
      <div class="film-card${isSer ? ' series-card' : ''}" onclick="openDetail(${f.id})">
        <div class="film-poster">
          ${f.posterImg
            ? `<img src="${f.posterImg}" alt="${f.title}" loading="lazy">`
            : (f.emoji || (isSer ? '📺' : '🎬'))
          }
          <div class="film-status ${cls}">${label}</div>
          <div class="film-overlay">👁</div>
        </div>
        <div class="film-info">
          <div class="film-title">${f.title}${seasonBadge}</div>
          <div class="film-meta">${f.year || ''} ${f.genre ? '· ' + f.genre : ''}</div>
          ${f.rating ? `<div class="stars" style="margin-top:5px">${renderStars(f.rating, 11)}</div>` : ''}
          ${epBar}
        </div>
      </div>
    `;
  }).join('');
}

let currentFilter = 'all';
let currentGenreFilter = '';

function renderFilms(type) {
  const t = type || 'film';
  const gridId = t === 'series' ? 'seriesGrid' : 'filmsGrid';
  const list = films.filter(f => (f.type||'film') === t);

function filterFilms(status, btn, type) {

  btn.closest('.filter-bar').querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const gridId = t === 'series' ? 'seriesGrid' : 'filmsGrid';

  renderFilmGrid(gridId, list);
}

function filterByGenre(genre, btn, type) {
  const t = type || 'film';
  btn.closest('.filter-bar').querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const gridId = t === 'series' ? 'seriesGrid' : 'filmsGrid';

// REVIEWS FEED (thread badge + final review preview)
function renderReviews() {
  const el = document.getElementById('reviewFeed');
  const withContent = films.filter(f =>
    (f.review && f.review.length > 0) || (f.thread && f.thread.length > 0)
  ).reverse();

    el.innerHTML = `<div class="empty-state"><div class="empty-icon">✍️</div><p>아직 감상이 없어요.<br>영화를 기록하고 타래를 남겨봐요!</p></div>`;
    return;
  }
  el.innerHTML = withContent.map(f => {
    const threadCount = f.thread ? f.thread.length : 0;
    const lastThread = threadCount > 0 ? f.thread[threadCount - 1].text : '';
    return `
    <div class="review-card" onclick="openDetail(${f.id})">
      <div class="review-header">
        <div class="review-poster-sm" style="position:relative;overflow:hidden">${f.posterImg ? `<img src="${f.posterImg}" alt="${f.title}" style="width:100%;height:100%;object-fit:cover;position:absolute;inset:0">` : (f.emoji || '🎬')}</div>
        <div class="review-meta">
          <h3>${f.title}${threadCount > 0 ? `<span class="thread-badge">🧵 ${threadCount}</span>` : ''}</h3>
          <div class="stars">${renderStars(f.rating)}</div>
          <div class="review-date">${f.date ? '📅 ' + f.date : ''}</div>
        </div>
      </div>
      ${threadCount > 0 ? `
        <div style="border-left:2px solid var(--border2);padding-left:12px;margin-bottom:12px">
          <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--gold);margin-bottom:6px;letter-spacing:0.1em">최근 타래</div>
          <div style="font-size:13px;color:var(--text-muted)">${lastThread}</div>
        </div>` : ''}

  }).join('');
}

// STATS
function renderStats() {
  const watched = films.filter(f => f.status === 'watched');
  // 연도 라벨 업데이트
  const yearLabel = document.getElementById('calYearLabel');
  if (yearLabel) yearLabel.textContent = getKoreanYear();
  const rated = watched.filter(f => f.rating > 0);
  const avgRating = rated.length > 0 ? (rated.reduce((s, f) => s + f.rating, 0) / rated.length).toFixed(1) : '—';
  const want = films.filter(f => f.status === 'want').length;

  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card"><span class="big-num">${watched.length}</span><div class="label">총 관람</div></div>
    <div class="stat-card"><span class="big-num">${avgRating}</span><div class="label">평균 별점</div></div>
    <div class="stat-card"><span class="big-num">${want}</span><div class="label">보고싶어요</div></div>
  `;

  // Genre chart
  const genreCounts = {};
  films.forEach(f => {
    if (f.genre) genreCounts[f.genre] = (genreCounts[f.genre] || 0) + 1;
  });
  const sorted = Object.entries(genreCounts).sort((a, b) => b[1] - a[1]);
  const max = sorted[0]?.[1] || 1;
  const genreEl = document.getElementById('genreChart');
  genreEl.innerHTML = `<h3>장르 분포</h3>` + (sorted.length === 0
    ? '<p style="color:var(--text-muted);font-size:13px">데이터 없음</p>'
    : sorted.map(([g, c]) => `
      <div class="genre-bar-row">
        <div class="genre-label">${g}</div>
        <div class="genre-bar-track"><div class="genre-bar-fill" style="width:${(c/max*100)}%"></div></div>
        <div class="genre-count">${c}</div>
      </div>
    `).join(''));

  // ── POSTER CALENDAR ──
  const calEl = document.getElementById('calendarGrid');
  const YEAR = getKoreanYear();
  const months = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const weekDays = ['일','월','화','수','목','금','토'];

  // date → [film, ...] map
  const dateMap = {};
  films.filter(f => f.date && f.status !== 'want').forEach(f => {
    if (!dateMap[f.date]) dateMap[f.date] = [];
    dateMap[f.date].push(f);
  });

  let calHtml = '<div class="poster-calendar">';

  for (let m = 0; m < 12; m++) {
    const daysInMonth = new Date(YEAR, m + 1, 0).getDate();
    const firstDow = new Date(YEAR, m, 1).getDay(); // 0=일
    const monthStr = months[m];
    const monthRecords = Object.entries(dateMap).filter(([d]) => {
      const dm = parseInt(d.split('-')[1]) - 1;
      return dm === m;
    });
    const monthCount = monthRecords.reduce((s,[,arr]) => s + arr.length, 0);

    calHtml += `<div class="cal-month-block">`;
    calHtml += `<div class="cal-month-name">${monthStr}${monthCount > 0 ? `<span class="cal-month-count">${monthCount}편</span>` : ''}</div>`;

    // week day headers
    calHtml += `<div class="cal-week-header">${weekDays.map(d => `<div class="cal-week-day">${d}</div>`).join('')}</div>`;
    calHtml += `<div class="cal-days-grid">`;

    // empty cells before 1st
    for (let i = 0; i < firstDow; i++) {
      calHtml += `<div class="cal-day empty"></div>`;
    }

    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = `${YEAR}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const dayFilms = dateMap[dateStr] || [];
      const hasRecord = dayFilms.length > 0;
      const f = dayFilms[0];

      if (hasRecord) {
        const poster = f.posterImg
          ? '<img src="' + f.posterImg + '" alt="' + (f.title||'') + '" loading="lazy">'
          : '<div class="cal-day-emoji">' + (f.emoji || '🎬') + '</div>';
        const multi = dayFilms.length > 1 ? `<div class="cal-day-multi">+${dayFilms.length - 1}</div>` : '';
        calHtml += `
          <div class="cal-day has-record" onclick="openDetail(${f.id})" title="${dayFilms.map(x=>x.title).join(', ')}">
            ${poster}
            <div class="cal-day-overlay"></div>
            <div class="cal-day-num">${d}</div>
            <div class="cal-day-title">${f.title}</div>
            ${multi}
          </div>`;
      } else {
        calHtml += `<div class="cal-day"><div class="cal-day-num">${d}</div></div>`;
      }
    }

    calHtml += `</div></div>`;
  }

  calHtml += '</div>';
  calEl.innerHTML = calHtml;

  // ── 영화 vs 시리즈 차트 ──
  const filmCount = films.filter(f => (f.type||'film') === 'film').length;
  const seriesCount = films.filter(f => f.type === 'series').length;
  const total = filmCount + seriesCount || 1;
  const typeEl = document.getElementById('typeChart');
  if (typeEl) {
    typeEl.innerHTML = `<h3>영화 vs 시리즈</h3>
      <div class="genre-bar-row">
        <div class="genre-label">영화</div>
        <div class="genre-bar-track"><div class="genre-bar-fill" style="width:${filmCount/total*100}%"></div></div>
        <div class="genre-count">${filmCount}</div>
      </div>
      <div class="genre-bar-row">
        <div class="genre-label">시리즈</div>
        <div class="genre-bar-track"><div class="genre-bar-fill" style="width:${seriesCount/total*100}%;background:linear-gradient(90deg,#3a4ea0,#6c8fff)"></div></div>
        <div class="genre-count">${seriesCount}</div>
      </div>`;
  }
}

// SEARCH
function handleSearch(val) {
  if (!val.trim()) { return; }
  const q = val.toLowerCase();
  const result = films.filter(f => f.title.toLowerCase().includes(q));
  const filmResults = result.filter(f => (f.type||'film') === 'film');
  const seriesResults = result.filter(f => f.type === 'series');
  // show whichever has more results, or films by default
  if (seriesResults.length > filmResults.length) {
    showPage('series');
    renderFilmGrid('seriesGrid', seriesResults);
  } else {
    showPage('films');
    renderFilmGrid('filmsGrid', filmResults);
  }
}

// MODAL

    document.getElementById('inputReview').value = f.review;

    document.getElementById('inputDate').value = f.date;
    setPosterPreview(f.posterImg || null, f.emoji || (t === 'series' ? '📺' : '🎬'));
    if (t === 'series') {
      document.getElementById('inputSeasons').value = f.seasons || '';
      document.getElementById('inputCurrentSeason').value = f.currentSeason || '';

    currentRating = f.rating;
    currentStatus = f.status;
    updateStarDisplay();
    document.querySelectorAll('.status-btn').forEach(b => {
      b.className = 'status-btn';
      const watchedLabel = t === 'series' ? '완주' : '봤어요';
      const label = f.status === 'watched' ? watchedLabel : f.status === 'want' ? '보고싶어요' : '보는중';
      if (b.textContent.trim().includes(label)) b.classList.add('selected-' + f.status);
    });
  } else {
    const t = defaultType || currentType || 'film';
    currentType = t;
    setType(t);
    document.getElementById('modalTitle').textContent = t === 'series' ? '시리즈 추가' : '영화 추가';
    document.getElementById('inputTitle').value = '';
    document.getElementById('inputYear').value = '';
    document.getElementById('inputGenre').value = '';
    document.getElementById('inputReview').value = '';
    document.getElementById('inputEmoji').value = '';
    document.getElementById('inputDate').value = getKoreanToday();

      document.getElementById('inputSeasons').value = '';
      document.getElementById('inputCurrentSeason').value = '';
      document.getElementById('inputTotalEp').value = '';
      document.getElementById('inputWatchedEp').value = '';

    document.querySelectorAll('.status-btn').forEach(b => b.className = 'status-btn');
    setPosterPreview(null, currentType === 'series' ? '📺' : '🎬');

  }
  document.getElementById('addModal').classList.add('open');
}

  });

function saveFilm() {
  const title = document.getElementById('inputTitle').value.trim();
  if (!title) { showToast('제목을 입력해주세요.'); return; }
  if (!currentStatus) { showToast('감상 상태를 선택해주세요.'); return; }
  const existing = editingId ? films.find(f => f.id === editingId) : null;
  const isSeries = currentType === 'series';
  const film = {
    id: editingId || Date.now(),
    type: currentType || 'film',
    title,
    year: parseInt(document.getElementById('inputYear').value) || '',
    genre: document.getElementById('inputGenre').value,
    status: currentStatus,
    rating: currentRating,
    date: document.getElementById('inputDate').value,
    review: document.getElementById('inputReview').value.trim(),
    emoji: document.getElementById('inputEmoji').value || (isSeries ? '📺' : '🎬'),
    posterImg: (currentPosterImg !== undefined && currentPosterImg !== null)
      ? currentPosterImg
      : (existing && existing.posterImg) ? existing.posterImg : null,
    tags: [],
    thread: existing ? (existing.thread || []) : [],
    ...(isSeries ? {
      seasons: parseInt(document.getElementById('inputSeasons').value) || 1,
      currentSeason: parseInt(document.getElementById('inputCurrentSeason').value) || 1,
      totalEp: parseInt(document.getElementById('inputTotalEp').value) || 0,
      watchedEp: parseInt(document.getElementById('inputWatchedEp').value) || 0,
    } : {}),
  };
  if (editingId) {
    const idx = films.findIndex(f => f.id === editingId);
    films[idx] = film;
    showToast('수정되었습니다 ✓');
  } else {
    films.push(film);
    showToast('기록이 추가되었습니다 ✓');
  }
  saveData();
  closeModal('addModal');
  closeModal('detailModal');
  renderHome();
  if (document.getElementById('page-films').classList.contains('active')) renderFilms('film');
  if (document.getElementById('page-series').classList.contains('active')) renderFilms('series');
  if (document.getElementById('page-reviews').classList.contains('active')) renderReviews();
  if (document.getElementById('page-stats').classList.contains('active')) renderStats();
}

// THREAD FUNCTIONS
function addThread(filmId) {
  const ta = document.getElementById('threadInput-' + filmId);
  const text = ta.value.trim();
  if (!text) return;
  const f = films.find(x => x.id === filmId);
  if (!f) return;
  if (!f.thread) f.thread = [];
  const now = new Date();
  const time = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
  f.thread.push({ id: 't' + Date.now(), text, time });
  saveData();
  ta.value = '';
  renderThreadList(filmId);
  renderReviews();
  showToast('타래 추가 ✓');
}

function deleteThread(filmId, threadId) {
  const f = films.find(x => x.id === filmId);
  if (!f) return;
  f.thread = f.thread.filter(t => t.id !== threadId);
  saveData();
  renderThreadList(filmId);
  renderReviews();
}

function renderThreadList(filmId) {
  const f = films.find(x => x.id === filmId);
  const container = document.getElementById('threadList-' + filmId);
  if (!container || !f) return;
  const items = f.thread || [];
  if (items.length === 0) {
    container.innerHTML = `<div style="color:var(--text-muted);font-size:12px;padding:8px 0 4px;font-family:'DM Mono',monospace;">아직 타래가 없어요. 영화 보면서 남겨봐요!</div>`;
    return;
  }
  container.innerHTML = items.map((t, i) => `
    <div class="thread-item">
      <div class="thread-line-wrap">
        <div class="thread-dot">${i + 1}</div>
      </div>
      <div class="thread-body">
        <button class="thread-delete-btn" onclick="deleteThread(${filmId}, '${t.id}')">✕</button>
        <div class="thread-text">${t.text}</div>
        <div class="thread-time">${t.time}</div>
      </div>
    </div>
  `).join('');
}

// DETAIL
function openDetail(id) {
const f = films.find(x => x.id === id);
if (!f) return;
const statusLabel = { watched: ‘봤어요’, want: ‘보고싶어요’, watching: ‘보는중’ }[f.status];
const statusCls = { watched: ‘status-watched’, want: ‘status-want’, watching: ‘status-watching’ }[f.status];
const isSer = (f.type || ‘film’) === ‘series’;
const epInfo = isSer && f.totalEp ? (() => {
const pct = Math.round((f.watchedEp||0)/f.totalEp*100);
return `<div style="margin-top:10px"> <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);margin-bottom:4px">${f.watchedEp||0} / ${f.totalEp} EP · ${pct}%</div> <div style="height:4px;background:var(--border2);border-radius:2px;overflow:hidden;width:140px"> <div style="width:${pct}%;height:100%;background:var(--gold)"></div> </div> </div>`;
})() : ‘’;
const seasonInfo = isSer && f.seasons ? `<div style="font-family:'DM Mono',monospace;font-size:11px;color:var(--text-muted);margin-bottom:6px">시즌 ${f.currentSeason||1} / ${f.seasons}</div>` : ‘’;
// Build season tabs for series
const buildSeasonTabs = () => {
if (!isSer || !f.seasons || f.seasons <= 1) return ‘’;
const tabs = Array.from({length: f.seasons}, (_, i) => i + 1).map(s =>
`<button class="season-tab${s === (f.currentSeason||1) ? ' active' : ''}" onclick="switchSeasonTab(${f.id}, ${s}, this)">S${s}</button>`
).join(’’);
return `<div class="season-tabs" id="seasonTabs-${f.id}">${tabs}</div>`;
};
document.getElementById(‘detailContent’).innerHTML = `<div class="detail-top"> <div class="detail-poster-lg" style="position:relative;overflow:hidden">${f.posterImg ?`<img src="${f.posterImg}" alt="${f.title}" style="width:100%;height:100%;object-fit:cover;position:absolute;inset:0">`: (f.emoji || (isSer ? '📺' : '🎬'))}</div> <div class="detail-info"> <h2>${f.title}</h2> <div class="detail-year">${f.year || ''} ${f.genre ? '· ' + f.genre : ''} ${isSer ? '· 시리즈' : ''}</div> ${seasonInfo} <div class="stars" style="margin-bottom:12px">${renderStars(f.rating, 18)}</div> <span class="film-status ${statusCls}" style="position:relative;top:auto;right:auto;display:inline-block;margin-bottom:12px">${statusLabel}</span> ${f.date ?`<div style="font-family:'DM Mono',monospace;font-size:11px;color:var(--text-muted)">📅 ${f.date}</div>`: ''} ${epInfo} </div> </div> ${buildSeasonTabs()} <div class="thread-section"> <div class="thread-section-title">실시간 타래</div> <div class="thread-list" id="threadList-${f.id}"></div> <div class="thread-input-row" style="margin-top:12px"> <div class="thread-input-dot">+</div> <div class="thread-input-wrap"> <textarea class="thread-textarea" id="threadInput-${f.id}" placeholder="지금 이 장면, 이 감정을 남겨봐요..." rows="2" onkeydown="if(event.key==='Enter'&&(event.metaKey||event.ctrlKey)){addThread(${f.id});event.preventDefault();}"></textarea> <button class="thread-submit-btn" onclick="addThread(${f.id})">타래 추가 ↵</button> </div> </div> </div> <div class="final-review-section"> <div class="thread-section-title">최종 감상</div> <div class="final-review-box" id="finalReviewBox-${f.id}"></div> </div> <div class="detail-actions" style="margin-top:20px"> <button class="btn-edit" onclick="closeModal('detailModal');openAddModal(${f.id})">✏ 기본 정보 수정</button> <button class="btn-delete" onclick="deleteFilm(${f.id})">삭제</button> </div>`;
renderThreadList(f.id);
renderFinalReview(f.id);
document.getElementById(‘detailModal’).classList.add(‘open’);
}

function deleteFilm(id) {
if (!confirm(‘정말 삭제하시겠어요?’)) return;
films = films.filter(f => f.id !== id);
saveData();
closeModal(‘detailModal’);
renderHome();
if (document.getElementById(‘page-films’).classList.contains(‘active’)) renderFilms(‘film’);
if (document.getElementById(‘page-series’).classList.contains(‘active’)) renderFilms(‘series’);
if (document.getElementById(‘page-reviews’).classList.contains(‘active’)) renderReviews();
showToast(‘삭제되었습니다.’);
}

// TOAST
function showToast(msg) {
const t = document.getElementById(‘toast’);
t.textContent = msg;
t.classList.add(‘show’);
setTimeout(() => t.classList.remove(‘show’), 2500);
}

// ── POSTER UPLOAD FUNCTIONS ──
function handlePosterUpload(input) {
const file = input.files[0];
if (!file) return;
// 이미지 리사이즈 (최대 600px, 품질 0.8)
const reader = new FileReader();
reader.onload = e => {
const img = new Image();
img.onload = () => {
const maxW = 600, maxH = 900;
let w = img.width, h = img.height;
if (w > maxW || h > maxH) {
const ratio = Math.min(maxW / w, maxH / h);
w = Math.round(w * ratio);
h = Math.round(h * ratio);
}
const canvas = document.createElement(‘canvas’);
canvas.width = w; canvas.height = h;
canvas.getContext(‘2d’).drawImage(img, 0, 0, w, h);
const dataUrl = canvas.toDataURL(‘image/jpeg’, 0.82);
currentPosterImg = dataUrl;
setPosterPreview(dataUrl, null);
};
img.src = e.target.result;
};
reader.readAsDataURL(file);
input.value = ‘’; // reset so same file can be reselected
}

function setPosterPreview(imgSrc, emoji) {
currentPosterImg = imgSrc || null;
const emojiEl = document.getElementById(‘posterPreviewEmoji’);
const imgEl = document.getElementById(‘posterPreviewImg’);
if (!emojiEl || !imgEl) return;
if (imgSrc) {
imgEl.src = imgSrc;
imgEl.style.display = ‘block’;
emojiEl.style.display = ‘none’;
} else {
imgEl.style.display = ‘none’;
imgEl.src = ‘’;
emojiEl.style.display = ‘’;
emojiEl.textContent = emoji || ‘🎬’;
}
}

function clearPosterImage() {
currentPosterImg = null;
const emojiVal = document.getElementById(‘inputEmoji’).value || (currentType === ‘series’ ? ‘📺’ : ‘🎬’);
setPosterPreview(null, emojiVal);
showToast(‘포스터 사진이 제거됐어요’);
}

// ── 한국 기준 현재 연도 ──
function getKoreanYear() {
// UTC+9 기준 현재 날짜
const now = new Date();
const kst = new Date(now.getTime() + 9 * 60 * 60 * 1000);
return kst.getUTCFullYear();
}

function getKoreanToday() {
const now = new Date();
const kst = new Date(now.getTime() + 9 * 60 * 60 * 1000);
const y = kst.getUTCFullYear();
const m = String(kst.getUTCMonth() + 1).padStart(2, ‘0’);
const d = String(kst.getUTCDate()).padStart(2, ‘0’);
return `${y}-${m}-${d}`;
}

// ── THEME FUNCTIONS ──
const THEMES = [‘default’,‘moonlight’,‘sakura’,‘matrix’,‘sunset’];
let currentTheme = localStorage.getItem(‘cinelog_theme’) || ‘default’;

function applyTheme(theme) {
THEMES.forEach(t => document.body.classList.remove(‘theme-’ + t));
if (theme !== ‘default’) document.body.classList.add(‘theme-’ + theme);
currentTheme = theme;
localStorage.setItem(‘cinelog_theme’, theme);
// update swatch active state
THEMES.forEach(t => {
const sw = document.getElementById(‘swatch-’ + t);
if (sw) sw.classList.toggle(‘active’, t === theme);
});
}

function openTheme() {
document.getElementById(‘themeOverlay’).classList.add(‘open’);
}
function closeTheme() {
document.getElementById(‘themeOverlay’).classList.remove(‘open’);
}

// ── SEASON TAB FUNCTION ──
function switchSeasonTab(filmId, season, btn) {
const f = films.find(x => x.id === filmId);
if (!f) return;
f.currentSeason = season;
saveData();
// update tab active states
const tabs = document.getElementById(‘seasonTabs-’ + filmId);
if (tabs) tabs.querySelectorAll(’.season-tab’).forEach((t, i) => t.classList.toggle(‘active’, i + 1 === season));
// update season display in detail-year
const detailYear = document.querySelector(’.detail-year’);
if (detailYear) {
detailYear.innerHTML = `${f.year || ''} ${f.genre ? '· ' + f.genre : ''} · 시리즈`;
}
showToast(`시즌 ${season} 선택 ✓`);
}

// ── INIT ──
applyTheme(currentTheme);
// 기존 저장 데이터 마이그레이션
films = films.map(f => ({
…f,
type: f.type || ‘film’,
posterImg: f.posterImg || null,
thread: f.thread || [],
}));
renderHome();
</script>
